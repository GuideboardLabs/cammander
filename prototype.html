<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>cammander</title>

<!-- Apple Web App -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="cammander">
<link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">

<!-- PWA manifest -->
<meta name="theme-color" content="#1e1e2e">
<meta name="application-name" content="cammander">
<link rel="manifest" href="/manifest.json">

<style>
/* ── Design tokens ────────────────────────────────────── */
:root {
  /* Warm light theme */
  --bg:          #f7f4ed;
  --bg-elevated: #fcfbf8;
  /* Charcoal system — opacity-modulated */
  --ink:              #1c1c1c;
  --ink-83:           rgba(28,28,28,0.83);
  --ink-82:           rgba(28,28,28,0.82);
  --ink-muted:        #5f5f5d;
  --ink-40:           rgba(28,28,28,0.4);
  --ink-12:           rgba(28,28,28,0.12);
  --ink-04:           rgba(28,28,28,0.04);
  --ink-03:           rgba(28,28,28,0.03);
  /* Borders */
  --border-passive:  #eceae4;
  --border-active:   rgba(28,28,28,0.4);
  /* Focus */
  --focus-shadow:    rgba(0,0,0,0.1) 0px 4px 12px;
  --ring-blue:       rgba(59,130,246,0.5);
  /* Accent — subtle warm accent for active states */
  --accent:          #3d3529;
  --accent-light:    rgba(61,53,41,0.08);
  /* Theme toggle icon colors (light) */
  --theme-sun:       #f59e0b;
  --theme-moon:      var(--ink-muted);
  /* Status dots (shared names, light values) */
  --dot-ok:          #22c55e;
  --dot-warn:        #eab308;
  --dot-err:         #ef4444;
  /* Syntax highlights — light */
  --syn-keyword:     #7c3aed;
  --syn-string:      #16a34a;
  --syn-number:      #2563eb;
  --syn-comment:     #9ca3af;
  --syn-func:        #db2777;
  /* Monospace */
  --mono:            'JetBrains Mono', 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  /* Sans — humanist fallback chain */
  --sans:            'Inter', 'Segoe UI', system-ui, ui-sans-serif, sans-serif;
  /* Radius */
  --radius-sm: 4px;
  --radius-md: 6px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-pill: 9999px;
  /* Transitions */
  --ease: cubic-bezier(0.4, 0, 0.2, 1);
  --dur: 180ms;
  /* Scrollbar (light) */
  --scrollbar-thumb: rgba(0,0,0,0.15);
  --scrollbar-track: transparent;
}

[data-theme="dark"] {
  /* Dark warm theme */
  --bg:          #1a1a2e;
  --bg-elevated: #222240;
  /* Light text system */
  --ink:              #e4e4ef;
  --ink-83:           rgba(228,228,239,0.83);
  --ink-82:           rgba(228,228,239,0.82);
  --ink-muted:        #8b8ba7;
  --ink-40:           rgba(228,228,239,0.4);
  --ink-12:           rgba(228,228,239,0.12);
  --ink-04:           rgba(228,228,239,0.04);
  --ink-03:           rgba(228,228,239,0.03);
  /* Borders */
  --border-passive:  #2e2e4a;
  --border-active:   rgba(228,228,239,0.35);
  /* Focus */
  --focus-shadow:    rgba(0,0,0,0.4) 0px 4px 12px;
  --ring-blue:       rgba(96,165,250,0.5);
  /* Accent — orange for dark theme (visible + warm) */
  --accent:          #f97316;
  --accent-light:    rgba(249,115,22,0.12);
  /* Theme toggle icon colors (dark) */
  --theme-sun:       var(--ink-muted);
  --theme-moon:      #818cf8;
  /* Status dots */
  --dot-ok:          #4ade80;
  --dot-warn:        #facc15;
  --dot-err:         #f87171;
  /* Syntax highlights — dark */
  --syn-keyword:     #c4b5fd;
  --syn-string:      #86efac;
  --syn-number:       #93c5fd;
  --syn-comment:     #6b7280;
  --syn-func:        #f9a8d4;
  /* Scrollbar (dark) */
  --scrollbar-thumb: rgba(255,255,255,0.12);
  --scrollbar-track: transparent;
}

/* ── Reset ────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
html { overflow: hidden; }

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-size: 14px;
  line-height: 1.5;
  touch-action: manipulation;
  overscroll-behavior: none;
  transition: background-color 0.25s var(--ease), color 0.25s var(--ease);
}

/* Scrollbar theming */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--scrollbar-track); }
::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }

button { font-family: inherit; cursor: pointer; }
input, textarea { font-family: inherit; }

/* ── App Shell ────────────────────────────────────────── */
#app {
  display: flex;
  flex-direction: column;
  /* 100vh = CSS viewport (includes browser chrome on mobile).
     100dvh = dynamic viewport (excludes chrome, modern browsers).
     calc(var(--vh)*100) = JS fallback using window.innerHeight. */
  height: calc(var(--vh, 1vh) * 100);
  height: 100vh;
  height: 100dvh;
  max-height: calc(var(--vh, 1vh) * 100);
  max-height: 100vh;
  max-height: 100dvh;
  overflow: hidden;
}

/* ── Top Bar ─────────────────────────────────────────── */
.topbar {
  display: flex;
  align-items: center;
  height: 42px;
  padding: 0 12px;
  border-bottom: 1px solid var(--border-passive);
  background: var(--bg);
  flex-shrink: 0;
  gap: 8px;
  z-index: 10;
}

.topbar-logo {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-right: 8px;
  user-select: none;
  text-decoration: none;
}

.topbar-logo img {
  height: 24px;
  width: 24px;
  object-fit: contain;
  flex-shrink: 0;
}

.topbar-logo span {
  color: var(--ink-muted);
  font-weight: 400;
}

.topbar-breadcrumb {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 13px;
  color: var(--ink-muted);
  flex-shrink: 0;
  white-space: nowrap;
  padding: 0 12px;
}

.breadcrumb-row {
  display: flex;
  align-items: center;
  height: 30px;
  flex-shrink: 0;
  border-bottom: 1px solid var(--border-passive);
  background: var(--bg-elevated);
  overflow-x: auto;
  overflow-y: hidden;
  scrollbar-width: none;
  -ms-overflow-style: none;
}

.breadcrumb-row::-webkit-scrollbar {
  display: none;
}

.topbar-breadcrumb .crumb {
  white-space: nowrap;
  cursor: pointer;
  padding: 2px 6px;
  border-radius: var(--radius-sm);
  transition: background var(--dur) var(--ease), color var(--dur) var(--ease);
}

.topbar-breadcrumb .crumb:hover {
  background: var(--ink-04);
  color: var(--ink);
}

.topbar-breadcrumb .crumb--current {
  color: var(--ink);
  font-weight: 500;
}

.topbar-breadcrumb .sep {
  color: var(--ink-12);
  user-select: none;
}

.topbar-actions {
  display: flex;
  align-items: center;
  gap: 6px;
  flex: 1;
}

.topbar-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  padding: 4px 10px;
  font-size: 12px;
  font-weight: 500;
  border-radius: var(--radius-md);
  border: 1px solid var(--border-passive);
  background: var(--bg);
  color: var(--ink-82);
  transition: background var(--dur) var(--ease), border-color var(--dur) var(--ease);
  white-space: nowrap;
}

.topbar-btn:hover {
  background: var(--ink-04);
  border-color: var(--border-active);
}

.topbar-btn--primary {
  background: var(--ink);
  color: var(--bg-elevated);
  border-color: var(--ink);
  box-shadow: rgba(255,255,255,0.2) 0px 0.5px 0px 0px inset,
              rgba(0,0,0,0.2) 0px 0px 0px 0.5px inset,
              rgba(0,0,0,0.05) 0px 1px 2px 0px;
}

.topbar-btn--primary:hover {
  opacity: 0.85;
}

.topbar-btn--primary:active {
  opacity: 0.75;
}

.topbar-btn--active {
  background: var(--accent);
  color: var(--bg-elevated);
  border-color: var(--accent);
}

.topbar-btn--settings {
  margin-left: auto;
  border-color: transparent;
  background: transparent;
  padding: 4px;
  color: var(--accent);
}

.topbar-btn--settings:hover {
  background: var(--ink-04);
  border-color: var(--border-passive);
}

/* ── Main Content ─────────────────────────────────────── */
.workspace {
  display: flex;
  flex-direction: column;
  flex: 1;
  min-height: 0;
  position: relative;
}

/* ── View Stack (folder view ↔ editor view) ──────────── */
.view-stack {
  flex: 1;
  min-height: 0;
  position: relative;
  overflow: hidden;
}

.view-panel {
  position: absolute;
  inset: 0;
  transition: transform 280ms var(--ease), opacity 220ms var(--ease);
  will-change: transform, opacity;
}

/* Folder view: always at base */
.view-panel--folder {
  transform: translateX(0);
  opacity: 1;
}

.view-panel--folder.slide-out {
  transform: translateX(-60px);
  opacity: 0;
  pointer-events: none;
}

/* Editor view: slides in from right */
.view-panel--editor {
  transform: translateX(100%);
  opacity: 0;
  pointer-events: none;
}

.view-panel--editor.slide-in {
  transform: translateX(0);
  opacity: 1;
  pointer-events: auto;
}

/* ── File Action Buttons (hover-reveal) ──────────────── */
.file-row-actions {
  display: flex;
  gap: 2px;
  align-items: center;
  opacity: 0;
  transition: opacity var(--dur) var(--ease);
  flex-shrink: 0;
}
.file-row:hover .file-row-actions,
.file-card:hover .file-row-actions {
  opacity: 1;
}
.file-action-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 26px;
  height: 26px;
  border: 1px solid var(--border-passive);
  border-radius: var(--radius-sm);
  background: var(--bg-elevated);
  color: var(--ink-muted);
  font-size: 12px;
  cursor: pointer;
  transition: background var(--dur) var(--ease), color var(--dur) var(--ease);
  padding: 0;
}
.file-action-btn:hover {
  background: var(--ink-04);
  color: var(--ink);
}
.file-action-btn--danger:hover {
  background: rgba(220,38,38,0.08);
  color: #dc2626;
  border-color: rgba(220,38,38,0.2);
}

/* File card actions */
.file-card-actions {
  position: absolute;
  top: 6px;
  right: 6px;
  display: flex;
  gap: 2px;
  opacity: 0;
  transition: opacity var(--dur) var(--ease);
}
.file-card:hover .file-card-actions {
  opacity: 1;
}
.file-card { position: relative; }

/* ── Workspace Picker ─────────────────────────────────── */
.wpicker-overlay {
  position: fixed;
  inset: 0;
  background: rgba(28,28,28,0.35);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
  backdrop-filter: blur(6px);
}
.wpicker-overlay--hidden { display: none; }
.wpicker-modal {
  background: var(--bg-elevated);
  border: 1px solid var(--border-passive);
  border-radius: var(--radius-xl);
  width: 520px;
  max-width: 92vw;
  max-height: calc(100vh - 48px);
  display: flex;
  flex-direction: column;
  box-shadow: 0 12px 48px rgba(0,0,0,0.18);
}
.wpicker-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px 12px;
  border-bottom: 1px solid var(--border-passive);
}
.wpicker-title {
  font-size: 16px;
  font-weight: 600;
  letter-spacing: -0.3px;
}
.wpicker-path-bar {
  display: flex;
  gap: 6px;
  padding: 10px 20px 6px;
}
.wpicker-path-input {
  flex: 1;
  font-size: 12px;
  font-family: 'SF Mono', 'Fira Code', monospace;
}
.wpicker-browse-btn {
  padding: 6px 14px;
  font-size: 12px;
  font-weight: 600;
  background: var(--ink);
  color: var(--bg);
  border: none;
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: opacity var(--dur) var(--ease);
}
.wpicker-browse-btn:hover { opacity: 0.85; }
.wpicker-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px 12px;
  min-height: 180px;
  max-height: 50vh;
}
.wpicker-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: background var(--dur) var(--ease);
  border: 1px solid transparent;
}
.wpicker-item:hover {
  background: rgba(0,0,0,0.04);
}
.wpicker-item--selected {
  background: rgba(0,0,0,0.06);
  border-color: var(--border-active);
}
.wpicker-item-icon {
  font-size: 20px;
  flex-shrink: 0;
  width: 28px;
  text-align: center;
}
.wpicker-item-info {
  flex: 1;
  min-width: 0;
}
.wpicker-item-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--ink);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.wpicker-item-path {
  font-size: 11px;
  color: var(--ink-muted);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.wpicker-item-badge {
  font-size: 9px;
  font-weight: 600;
  padding: 2px 6px;
  border-radius: 999px;
  background: var(--border-passive);
  color: var(--ink-muted);
  text-transform: uppercase;
  letter-spacing: 0.3px;
  flex-shrink: 0;
}
.wpicker-item-badge--git {
  background: rgba(46,160,67,0.12);
  color: #1a7f37;
}
.wpicker-empty {
  text-align: center;
  color: var(--ink-muted);
  font-size: 13px;
  padding: 40px 20px;
}
.wpicker-footer {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-top: 8px;
}
.wpicker-new-btn {
  padding: 6px 12px;
  font-size: 12px;
  font-weight: 500;
  color: var(--accent, #f97316);
  background: transparent;
  border: none;
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: background var(--dur) var(--ease);
  white-space: nowrap;
}
.wpicker-new-btn:hover {
  background: rgba(249, 115, 22, 0.08);
}
.wpicker-new-row {
  display: flex;
  gap: 6px;
  align-items: center;
}
.wpicker-new-input {
  flex: 1;
  min-width: 0;
}

/* ── New File Modal ──────────────────────────────────── */
.newfile-overlay {
  position: fixed;
  inset: 0;
  background: rgba(28,28,28,0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  backdrop-filter: blur(4px);
}
.newfile-overlay--hidden { display: none; }
.newfile-modal {
  background: var(--bg-elevated);
  border: 1px solid var(--border-passive);
  border-radius: var(--radius-xl);
  padding: 24px;
  width: 380px;
  max-width: 90vw;
  box-shadow: 0 8px 32px rgba(0,0,0,0.12);
}
.newfile-modal h3 {
  font-size: 16px;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 16px;
}
.newfile-field {
  margin-bottom: 12px;
}
.newfile-field label {
  display: block;
  font-size: 11px;
  font-weight: 500;
  color: var(--ink-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 4px;
}
.newfile-field input,
.newfile-field select,
.newfile-field textarea {
  width: 100%;
  padding: 8px 10px;
  font-size: 13px;
  border: 1px solid var(--border-passive);
  border-radius: var(--radius-md);
  background: var(--bg);
  color: var(--ink);
  outline: none;
  transition: border-color var(--dur) var(--ease);
}
.newfile-field input:focus,
.newfile-field select:focus,
.newfile-field textarea:focus {
  border-color: var(--border-active);
}
.newfile-field textarea {
  min-height: 80px;
  resize: vertical;
  font-family: var(--mono);
  font-size: 12px;
}
.newfile-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  margin-top: 16px;
}
.newfile-btn {
  padding: 7px 16px;
  font-size: 13px;
  font-weight: 500;
  border-radius: var(--radius-md);
  border: 1px solid var(--border-passive);
  background: var(--bg);
  color: var(--ink);
  cursor: pointer;
  transition: background var(--dur) var(--ease);
}
.newfile-btn:hover { background: var(--ink-04); }
.newfile-btn--primary {
  background: var(--ink);
  color: var(--bg);
  border-color: var(--ink);
}
.newfile-btn--primary:hover {
  background: var(--accent);
  border-color: var(--accent);
}

/* ── Edit Mode ──────────────────────────────────────── */
.edit-btn {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  font-size: 12px;
  font-weight: 500;
  color: var(--ink-muted);
  background: transparent;
  border: 1px solid var(--border-passive);
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: background var(--dur) var(--ease), color var(--dur) var(--ease);
  margin-left: auto;
}
.edit-btn:hover { background: var(--ink-04); color: var(--ink); }
.editor-textarea-wrap {
  flex: 1;
  min-height: 0;
  position: relative;
  overflow: hidden;
  background: var(--bg-elevated);
  border-top: 1px solid var(--border-passive);
}
.editor-highlight-backdrop {
  position: absolute;
  inset: 0;
  overflow: auto;
  font-family: var(--mono);
  font-size: 13px;
  line-height: 1.6;
  padding: 12px 16px;
  white-space: pre;
  color: var(--ink);
  pointer-events: none;
  z-index: 1;
  /* line numbers column reserved — matches read-only view width */
}
.editor-highlight-backdrop .code-line {
  display: flex;
  min-height: 21px;
}
.editor-highlight-backdrop .line-num {
  display: inline-block;
  width: 50px;
  text-align: right;
  padding-right: 16px;
  color: var(--ink-muted);
  user-select: none;
  flex-shrink: 0;
}
.editor-highlight-backdrop .line-content {
  flex: 1;
  white-space: pre;
}
.editor-textarea {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  padding: 12px 16px 12px 66px;
  font-family: var(--mono);
  font-size: 13px;
  line-height: 1.6;
  border: none;
  background: transparent;
  color: transparent;
  caret-color: var(--accent);
  resize: none;
  outline: none;
  tab-size: 2;
  z-index: 2;
  white-space: pre;
  overflow: auto;
  /* Match backdrop scrollbar area */
  -webkit-text-fill-color: transparent;
}
.editor-toolbar {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 12px;
  background: var(--ink-03);
  border-top: 1px solid var(--border-passive);
  flex-shrink: 0;
}
.editor-toolbar-btn {
  padding: 4px 12px;
  font-size: 12px;
  font-weight: 500;
  border: 1px solid var(--border-passive);
  border-radius: var(--radius-md);
  background: var(--bg);
  color: var(--ink);
  cursor: pointer;
  transition: background var(--dur) var(--ease);
}
.editor-toolbar-btn:hover { background: var(--ink-04); }
.editor-toolbar-btn--save {
  background: var(--ink);
  color: var(--bg);
  border-color: var(--ink);
}
.editor-toolbar-btn--save:hover { background: var(--accent); border-color: var(--accent); }

/* ── Image Viewer ────────────────────────────────────── */
.image-viewer {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: auto;
  padding: 24px;
  background: repeating-conic-gradient(var(--border-passive) 0% 25%, var(--bg) 0% 50%) 50% / 20px 20px;
}
.image-viewer img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
  border: 1px solid var(--border-passive);
  border-radius: var(--radius-md);
  background: white;
}

/* ── Loading State ────────────────────────────────────── */
.folder-loading {
  display: flex;
  align-items: center;
  justify-content: center;
  flex: 1;
  color: var(--ink-muted);
  font-size: 13px;
  gap: 8px;
}
.folder-loading::before {
  content: '';
  width: 18px;
  height: 18px;
  border: 2px solid var(--border-passive);
  border-top-color: var(--ink-muted);
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Folder View ──────────────────────────────────────── */
.folder-view {
  display: flex;
  flex-direction: column;
  height: 100%;
  overflow: hidden;
}

.folder-header {
  display: flex;
  align-items: center;
  padding: 16px 20px 12px;
  gap: 8px;
}

.folder-header h2 {
  font-size: 18px;
  font-weight: 600;
  letter-spacing: -0.3px;
  color: var(--ink);
  flex: 1;
}

.folder-header-right {
  display: flex;
  gap: 6px;
}

.icon-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 32px;
  height: 32px;
  border-radius: var(--radius-md);
  border: 1px solid transparent;
  background: transparent;
  color: var(--ink-muted);
  transition: background var(--dur) var(--ease), color var(--dur) var(--ease), border-color var(--dur) var(--ease);
}

.icon-btn:hover {
  background: var(--ink-04);
  color: var(--ink);
  border-color: var(--border-passive);
}

.icon-btn--active {
  background: var(--accent-light);
  color: var(--ink);
  border-color: var(--border-active);
}

/* File grid */
.folder-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 8px;
  padding: 0 20px 20px;
  overflow-y: auto;
  flex: 1;
}

.file-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  padding: 16px 8px 12px;
  border-radius: var(--radius-lg);
  border: 1px solid var(--border-passive);
  background: var(--bg);
  cursor: pointer;
  transition: background var(--dur) var(--ease), border-color var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
  user-select: none;
}

.file-card:hover {
  background: var(--ink-04);
  border-color: var(--border-active);
}

.file-card:active {
  box-shadow: var(--focus-shadow);
}

.file-card-icon {
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-md);
  background: var(--ink-03);
  font-size: 20px;
}

.file-card-icon--dir {
  background: rgba(59,130,246,0.08);
  color: #3b82f6;
  font-size: 22px;
}

.file-card-name {
  font-size: 12px;
  font-weight: 500;
  color: var(--ink-82);
  text-align: center;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  max-width: 100%;
}

.file-card-meta {
  font-size: 10px;
  color: var(--ink-muted);
  opacity: 0.7;
}

/* List view */
.folder-list {
  padding: 0 12px 20px;
  overflow-y: auto;
  flex: 1;
}

.file-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: background var(--dur) var(--ease);
  user-select: none;
}

.file-row:hover {
  background: var(--ink-04);
}

.file-row-icon {
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-sm);
  background: var(--ink-03);
  font-size: 14px;
  flex-shrink: 0;
}

.file-row-icon--dir {
  background: rgba(59,130,246,0.08);
  color: #3b82f6;
  font-size: 15px;
}

.file-row-name {
  flex: 1;
  font-size: 13px;
  color: var(--ink-82);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.file-row-size {
  font-size: 11px;
  color: var(--ink-muted);
  flex-shrink: 0;
  font-variant-numeric: tabular-nums;
}

.file-row-date {
  font-size: 11px;
  color: var(--ink-muted);
  flex-shrink: 0;
  opacity: 0.7;
  width: 80px;
  text-align: right;
}

/* Empty state */
.folder-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  gap: 12px;
  color: var(--ink-muted);
  text-align: center;
  padding: 40px 20px;
}

.folder-empty-icon {
  font-size: 48px;
  opacity: 0.3;
}

.folder-empty h3 {
  font-size: 16px;
  font-weight: 500;
  color: var(--ink-82);
}

.folder-empty p {
  font-size: 13px;
  color: var(--ink-muted);
  max-width: 280px;
}

/* ── Editor View ──────────────────────────────────────── */
.editor-view {
  display: flex;
  flex-direction: column;
  height: 100%;
  overflow: hidden;
}

.editor-back-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 12px;
  border-bottom: 1px solid var(--border-passive);
  background: var(--bg);
  flex-shrink: 0;
}

.back-btn {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  font-size: 12px;
  font-weight: 500;
  color: var(--ink-muted);
  background: transparent;
  border: 1px solid var(--border-passive);
  border-radius: var(--radius-md);
  transition: background var(--dur) var(--ease), color var(--dur) var(--ease);
}

.back-btn:hover {
  background: var(--ink-04);
  color: var(--ink);
}

.editor-file-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--ink-82);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.editor-file-modified {
  font-size: 8px;
  color: #b8860b;
  margin-left: 4px;
}

.editor-tabs-row {
  display: flex;
  align-items: center;
  background: var(--ink-03);
  border-bottom: 1px solid var(--border-passive);
  overflow-x: auto;
  overflow-y: hidden;
  flex-shrink: 0;
}

.editor-tab {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 6px 12px;
  padding-right: 6px;
  font-size: 12px;
  color: var(--ink-muted);
  background: transparent;
  border: none;
  border-right: 1px solid var(--border-passive);
  cursor: pointer;
  transition: background var(--dur) var(--ease), color var(--dur) var(--ease);
  white-space: nowrap;
  flex-shrink: 0;
}

.editor-tab:hover {
  background: var(--ink-04);
  color: var(--ink-82);
}

.editor-tab--active {
  background: var(--bg);
  color: var(--ink);
  border-bottom: 2px solid #8b7355;
  font-weight: 500;
}

.editor-tab-close {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 18px;
  height: 18px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  opacity: 0.4;
  transition: opacity var(--dur) var(--ease), background var(--dur) var(--ease);
}

.editor-tab-close:hover {
  opacity: 1;
  background: var(--ink-04);
}

/* Code area */
.code-area {
  flex: 1;
  min-height: 0;
  overflow: auto;
  background: var(--bg-elevated);
  color: var(--ink);
  font-family: var(--mono);
  font-size: 13px;
  line-height: 1.6;
  padding: 12px 0;
  position: relative;
}

.code-line {
  display: flex;
  min-height: 21px;
  padding: 0 16px 0 0;
}

.code-line:hover {
  background: rgba(255,255,255,0.04);
}

.line-num {
  display: inline-block;
  width: 50px;
  text-align: right;
  padding-right: 16px;
  color: var(--ink-muted);
  user-select: none;
  flex-shrink: 0;
}

.line-content {
  flex: 1;
  white-space: pre;
}

/* ── Code areas: always dark, even in light mode ── */
.code-area,
.editor-textarea-wrap,
.editor-highlight-backdrop {
  background: #1a1a2e !important;
  color: #e4e4ef !important;
}
.code-line:hover {
  background: rgba(255,255,255,0.04) !important;
}
.line-num,
.editor-highlight-backdrop .line-num {
  color: #6b7294 !important;
}
/* Syntax colors — always dark-theme values */
.kw  { color: #c4b5fd !important; }
.str { color: #86efac !important; }
.cm  { color: #6b7280 !important; }
.fn  { color: #f9a8d4 !important; }
.tp  { color: #f9a8d4 !important; }
.num { color: #93c5fd !important; }
.op  { color: #8b8ba7 !important; }
.pn  { color: rgba(228,228,239,0.83) !important; }
.kw2 { color: #f59e0b !important; }
.dec { color: #10b981 !important; }
.editor-textarea {
  caret-color: #f97316 !important;
}

/* ── Terminal Panel ───────────────────────────────────── */
.terminal-panel {
  display: flex;
  flex-direction: column;
  border-top: 1px solid var(--border-passive);
  background: #1a1a1a;
  flex-shrink: 0;
  transition: height 220ms var(--ease), flex-grow 220ms var(--ease);
  overflow: hidden;
}

.terminal-panel--collapsed {
  height: 34px;
}

.terminal-panel--expanded {
  height: 240px;
}

.terminal-panel--maximized {
  flex: 1;
  min-height: 0;
}

.terminal-header {
  display: flex;
  align-items: center;
  height: 34px;
  padding: 0 10px;
  gap: 8px;
  cursor: pointer;
  user-select: none;
  flex-shrink: 0;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.terminal-header:hover {
  background: rgba(255,255,255,0.03);
}

.terminal-header-title {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: #888;
  flex: 1;
}

.terminal-header-badge {
  background: var(--accent);
  color: var(--bg);
  font-size: 9px;
  padding: 1px 5px;
  border-radius: var(--radius-pill);
  font-weight: 600;
}

.terminal-header-actions {
  display: flex;
  gap: 4px;
}

.terminal-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 22px;
  height: 22px;
  border-radius: var(--radius-sm);
  border: none;
  background: transparent;
  color: #888;
  font-size: 12px;
  transition: background var(--dur) var(--ease), color var(--dur) var(--ease);
}

.terminal-btn:hover {
  background: rgba(255,255,255,0.08);
  color: #ccc;
}

.terminal-body {
  flex: 1;
  overflow: hidden;
  padding: 2px 0;
}

.terminal-body .xterm {
  height: 100%;
  padding: 0 6px;
}

/* Remove old fake terminal styles — no longer used */

/* ── Chat Panel (right sidebar) ───────────────────────── */
.chat-panel {
  border-left: 1px solid var(--border-passive);
  background: var(--bg);
  display: flex;
  flex-direction: column;
  transition: width 220ms var(--ease), opacity 180ms var(--ease);
  min-width: 0;
}

.chat-panel--expanded {
  opacity: 1;
}

.chat-header {
  display: flex;
  align-items: center;
  height: 42px;
  padding: 0 12px;
  border-bottom: 1px solid var(--border-passive);
  flex-shrink: 0;
  gap: 8px;
}

.chat-header-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--ink);
  flex: 1;
}

.chat-model-badge {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: var(--radius-pill);
  background: var(--ink-04);
  color: var(--ink-muted);
  font-weight: 500;
}

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.chat-msg {
  max-width: 100%;
}

.chat-msg--user {
  align-self: flex-end;
}

.chat-msg--assistant {
  align-self: flex-start;
}

.chat-msg-bubble {
  padding: 10px 14px;
  border-radius: var(--radius-lg);
  font-size: 13px;
  line-height: 1.5;
}

.chat-msg--user .chat-msg-bubble {
  background: var(--ink);
  color: var(--bg-elevated);
  border-bottom-right-radius: var(--radius-sm);
  box-shadow: 0px 0.5px 0px 0px rgba(255,255,255,0.1) inset,
              0px 0px 0px 0.5px rgba(0,0,0,0.15) inset,
              0px 1px 2px 0px rgba(0,0,0,0.08);
}

.chat-msg--assistant .chat-msg-bubble {
  background: var(--bg-elevated);
  color: var(--ink-82);
  border: 1px solid var(--border-passive);
  border-bottom-left-radius: var(--radius-sm);
}

.chat-msg-meta {
  font-size: 10px;
  color: var(--ink-muted);
  margin-top: 3px;
  opacity: 0.6;
}

.chat-msg--user .chat-msg-meta {
  text-align: right;
}

/* Markdown rendered content inside assistant bubbles */
.chat-msg--assistant .chat-msg-bubble p {
  margin: 0 0 6px 0;
}
.chat-msg--assistant .chat-msg-bubble p:last-child {
  margin-bottom: 0;
}
.chat-msg--assistant .chat-msg-bubble code {
  background: var(--ink-04);
  border: 1px solid var(--border-passive);
  border-radius: 3px;
  padding: 1px 5px;
  font-size: 12px;
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  color: var(--syn-number);
}
.chat-msg--assistant .chat-msg-bubble pre {
  background: var(--ink-12);
  border: 1px solid var(--border-passive);
  border-radius: var(--radius-md);
  padding: 10px 12px;
  margin: 8px 0;
  overflow-x: auto;
  font-size: 12px;
  line-height: 1.45;
}
.chat-msg--assistant .chat-msg-bubble pre code {
  background: none;
  border: none;
  padding: 0;
  color: var(--ink-82);
}
.chat-msg--assistant .chat-msg-bubble ul,
.chat-msg--assistant .chat-msg-bubble ol {
  margin: 4px 0;
  padding-left: 20px;
}
.chat-msg--assistant .chat-msg-bubble li {
  margin: 2px 0;
}
.chat-msg--assistant .chat-msg-bubble strong {
  color: var(--ink);
  font-weight: 600;
}
.chat-msg--assistant .chat-msg-bubble h1,
.chat-msg--assistant .chat-msg-bubble h2,
.chat-msg--assistant .chat-msg-bubble h3 {
  font-size: 14px;
  font-weight: 600;
  color: var(--ink);
  margin: 10px 0 4px 0;
}
.chat-msg--assistant .chat-msg-bubble h1 { font-size: 15px; }
.chat-msg--assistant .chat-msg-bubble h2 { font-size: 14px; }
.chat-msg--assistant .chat-msg-bubble h3 { font-size: 13px; }
.chat-msg--assistant .chat-msg-bubble a {
  color: #e8a060;
  text-decoration: underline;
}
.chat-msg--assistant .chat-msg-bubble blockquote {
  border-left: 3px solid var(--border-passive);
  margin: 6px 0;
  padding: 4px 10px;
  color: var(--ink-muted);
}
.chat-msg--assistant .chat-msg-bubble hr {
  border: none;
  border-top: 1px solid var(--border-passive);
  margin: 8px 0;
}

.chat-composer {
  display: flex;
  align-items: flex-end;
  padding: 10px 12px;
  border-top: 1px solid var(--border-passive);
  gap: 8px;
}

.chat-input-wrapper {
  flex: 1;
  border: 1px solid var(--border-passive);
  border-radius: var(--radius-lg);
  background: var(--bg-elevated);
  display: flex;
  align-items: flex-end;
  transition: border-color var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
  overflow: hidden;
}

.chat-input-wrapper:focus-within {
  border-color: var(--border-active);
  box-shadow: var(--focus-shadow);
}

.chat-textarea {
  flex: 1;
  border: none;
  outline: none;
  resize: none;
  padding: 10px 14px;
  font-family: var(--sans);
  font-size: 13px;
  line-height: 1.4;
  color: var(--ink);
  background: transparent;
  max-height: 100px;
  min-height: 40px;
}

.chat-textarea::placeholder {
  color: var(--ink-muted);
}

.chat-send-btn {
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-md);
  background: var(--ink);
  color: var(--bg-elevated);
  border: none;
  box-shadow: rgba(255,255,255,0.2) 0px 0.5px 0px 0px inset,
              rgba(0,0,0,0.2) 0px 0px 0px 0.5px inset,
              rgba(0,0,0,0.05) 0px 1px 2px 0px;
  transition: opacity var(--dur) var(--ease);
  flex-shrink: 0;
}

.chat-send-btn:hover {
  opacity: 0.85;
}

.chat-send-btn:active {
  opacity: 0.75;
}

/* ── Session sidebar ─────────────────────────────────── */
.chat-session-bar {
  border-bottom: 1px solid var(--border-passive);
  flex-shrink: 0;
  overflow: hidden;
  transition: max-height 200ms var(--ease);
}

.chat-session-bar--collapsed {
  max-height: 0;
  border-bottom: none;
}

.chat-session-bar--expanded {
  max-height: 220px;
}

.chat-session-list {
  overflow-y: auto;
  max-height: 160px;
  padding: 4px 6px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.chat-session-item {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 8px;
  border-radius: var(--radius-md);
  font-size: 12px;
  color: var(--ink-82);
  cursor: pointer;
  transition: background var(--dur) var(--ease);
  position: relative;
  overflow: hidden;
}

.chat-session-item:hover {
  background: var(--ink-04);
}

.chat-session-item--active {
  background: var(--accent-light);
  color: var(--ink);
  font-weight: 500;
}

.chat-session-item-title {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.chat-session-item-delete {
  opacity: 0;
  width: 18px;
  height: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-sm);
  background: transparent;
  border: none;
  color: var(--ink-muted);
  font-size: 11px;
  cursor: pointer;
  flex-shrink: 0;
  transition: opacity var(--dur) var(--ease), background var(--dur) var(--ease);
}

.chat-session-item:hover .chat-session-item-delete {
  opacity: 1;
}

.chat-session-item-delete:hover {
  background: var(--ink-04);
  color: var(--ink);
}

.chat-new-session-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 10px;
  margin: 4px 6px;
  border-radius: var(--radius-md);
  font-size: 12px;
  font-weight: 500;
  color: var(--ink-muted);
  cursor: pointer;
  border: 1px dashed var(--border-passive);
  background: transparent;
  transition: background var(--dur) var(--ease), color var(--dur) var(--ease), border-color var(--dur) var(--ease);
  width: calc(100% - 12px);
}

.chat-new-session-btn:hover {
  background: var(--ink-04);
  color: var(--ink);
  border-color: var(--border-active);
}

/* ── Tool call blocks ──────────────────────────────────── */
.chat-tool-call {
  margin-top: 6px;
  border: 1px solid var(--border-passive);
  border-radius: var(--radius-md);
  overflow: hidden;
  font-size: 12px;
}

.chat-tool-call-header {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 10px;
  background: var(--ink-03);
  cursor: pointer;
  user-select: none;
  color: var(--ink-muted);
  transition: background var(--dur) var(--ease);
}

.chat-tool-call-header:hover {
  background: var(--ink-04);
}

.chat-tool-call-icon {
  font-size: 12px;
  flex-shrink: 0;
}

.chat-tool-call-name {
  flex: 1;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink-82);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.chat-tool-call-toggle {
  font-size: 10px;
  color: var(--ink-muted);
  transition: transform var(--dur) var(--ease);
}

.chat-tool-call--expanded .chat-tool-call-toggle {
  transform: rotate(90deg);
}

.chat-tool-call-body {
  display: none;
  padding: 8px 10px;
  background: var(--bg-elevated);
  font-family: var(--mono);
  font-size: 11px;
  line-height: 1.5;
  color: var(--ink-82);
  white-space: pre-wrap;
  word-break: break-all;
  max-height: 200px;
  overflow-y: auto;
  border-top: 1px solid var(--border-passive);
}

.chat-tool-call--expanded .chat-tool-call-body {
  display: block;
}

.chat-msg-role-label {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--ink-muted);
  margin-bottom: 3px;
}

.chat-header-new-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  border-radius: var(--radius-md);
  border: 1px solid var(--border-passive);
  background: transparent;
  color: var(--ink-muted);
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: background var(--dur) var(--ease), color var(--dur) var(--ease), border-color var(--dur) var(--ease);
}

.chat-header-new-btn:hover {
  background: var(--ink-04);
  color: var(--ink);
  border-color: var(--border-active);
}

.chat-header-session-toggle {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  border-radius: var(--radius-md);
  border: none;
  background: transparent;
  color: var(--ink-muted);
  font-size: 14px;
  cursor: pointer;
  transition: background var(--dur) var(--ease), color var(--dur) var(--ease);
}

.chat-header-session-toggle:hover {
  background: var(--ink-04);
  color: var(--ink);
}

/* ── Split layout ─────────────────────────────────────── */
.main-split {
  flex: 1;
  min-height: 0;
  overflow: hidden;
  /* Grid that adapts: 2 cols, 2 rows */
  display: grid;
  grid-template-columns: 1fr auto;
  grid-template-rows: 1fr auto;
}

.main-split > .content-area {
  grid-row: 1;
  grid-column: 1 / -1; /* full width when no chat */
  min-height: 0;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* When chat is visible, content-area only takes left column */
.main-split--chat > .content-area,
.main-split--dual > .content-area {
  grid-column: 1;
}

.main-split > .terminal-panel--collapsed {
  grid-row: 2;
  grid-column: 1 / -1;
  height: 34px;
  flex-shrink: 0;
}

.main-split > .terminal-panel--expanded {
  grid-row: 2;
  grid-column: 1 / -1;
  height: 240px;
  flex-shrink: 0;
}

.main-split > .terminal-panel--maximized {
  grid-row: 1 / -1;
  grid-column: 1 / -1;
  height: 100%;
  z-index: 50;
}

/* Chat panel hidden by default */
.main-split > .chat-panel--collapsed {
  grid-row: 1;
  grid-column: 2;
  width: 0;
  min-width: 0;
  overflow: hidden;
  opacity: 0;
  pointer-events: none;
  border: none;
}

/* Chat visible — takes 340px (or 420px in dual mode) */
.main-split--chat > .chat-panel--expanded,
.main-split--dual > .chat-panel--expanded {
  grid-row: 1;
  grid-column: 2;
  opacity: 1;
  width: 340px;
}

/* In dual mode, chat gets wider */
.main-split--dual > .chat-panel--expanded {
  width: 420px;
}

/* Terminal not visible — hide the row */
.main-split > .terminal-panel--hidden {
  grid-row: 2;
  grid-column: 1 / -1;
  height: 0;
  overflow: hidden;
  border: none;
}

.content-area {
  flex: 1;
  min-width: 0;
  min-height: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Status Bar ───────────────────────────────────────── */
.statusbar {
  display: flex;
  align-items: center;
  height: 24px;
  padding: 0 10px;
  border-top: 1px solid var(--border-passive);
  background: var(--ink-03);
  font-size: 11px;
  color: var(--ink-muted);
  gap: 12px;
  flex-shrink: 0;
}

.statusbar-item {
  display: flex;
  align-items: center;
  gap: 4px;
}

.statusbar-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 12px;
}

.statusbar-connected {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #4ade80;
}

.statusbar-disconnected {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #f87171;
}

/* ── Settings Modal ─────────────────────────────────── */
.settings-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 180ms var(--ease);
}
.settings-overlay--open {
  opacity: 1;
  pointer-events: auto;
}
.settings-modal {
  background: var(--bg-elevated);
  border: 1px solid var(--border-passive);
  border-radius: var(--radius-lg);
  width: 480px;
  max-width: calc(100vw - 32px);
  max-height: calc(100vh - 64px);
  display: flex;
  flex-direction: column;
  box-shadow: rgba(0,0,0,0.15) 0px 8px 32px;
}
.settings-modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px 12px;
  border-bottom: 1px solid var(--border-passive);
}
.settings-modal-title {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -0.3px;
}
.settings-modal-body {
  padding: 16px 20px;
  overflow-y: auto;
  flex: 1;
}
.settings-section {
  margin-bottom: 20px;
}
.settings-section:last-child {
  margin-bottom: 0;
}
.settings-label {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--ink-muted);
  margin-bottom: 8px;

}
.settings-field {
  margin-bottom: 12px;
}
.settings-field label {

}
.settings-input {

}
.settings-input:focus {

}
.settings-input::placeholder {

}
.settings-provider-tabs {

  gap: 4px;

}
.settings-provider-tab {

  background: transparent;

  font-weight: 500;

}
.settings-provider-tab--active {

}
.settings-provider-tab--active::after {

}
.settings-active-indicator {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 12px;
  padding: 6px 10px;
  background: var(--ink-03);
  border-radius: var(--radius-md);
  font-size: 12px;

}
.settings-active-dot {

}
.settings-active-indicator--warn .settings-active-dot {

.settings-save-btn {

.settings-theme-toggle {
