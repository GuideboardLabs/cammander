<script>
// ── Mobile viewport fix ────────────────────────────────
function setVH() {
  document.documentElement.style.setProperty('--vh', (window.innerHeight * 0.01) + 'px');
}
setVH();
window.addEventListener('resize', setVH);
window.addEventListener('orientationchange', () => setTimeout(setVH, 100));

// ── State ──────────────────────────────────────────────
const state = {
  currentView: 'folder', // 'folder' | 'editor'
  currentPath: '',       // relative path string (e.g. '' for root, 'apps/backend')
  currentDir: null,      // current directory entries from API
  openTabs: [],
  activeTab: '',
  terminalExpanded: false,
  terminalMaximized: false,
  chatExpanded: false,
  viewMode: 'list', // 'list' | 'grid'
  files: {},        // path -> { content, type, name, ext } cached file data
  directoryCache: {}, // path -> entries[] cached directory listings
  editingFile: false,
  editContent: '',
  workspaceRoot: localStorage.getItem('cammander-workspace') || '',
  loading: false,
};

// ── File API helpers ───────────────────────────────────
function fileIcon(name, isDir) {
  if (isDir) return '📁';
  if (name.endsWith('.ts') || name.endsWith('.tsx')) return '🔷';
  if (name.endsWith('.css') || name.endsWith('.scss')) return '🎨';
  if (name.endsWith('.json')) return '📋';
  if (name.endsWith('.md')) return '📝';
  if (name.endsWith('.html')) return '🌐';
  if (name.endsWith('.py')) return '🐍';
  if (name.endsWith('.jpg') || name.endsWith('.jpeg') || name.endsWith('.png') || name.endsWith('.gif') || name.endsWith('.svg') || name.endsWith('.webp')) return '🖼';
  return '📄';
}

function formatSize(bytes) {
  if (bytes == null) return '—';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

function isImageFile(name) {
  return /\.(jpg|jpeg|png|gif|svg|webp)$/i.test(name);
}

function fullPath(relativePath, name) {
  return relativePath ? relativePath + '/' + name : name;
}

function absPath(relativePath) {
  return relativePath ? state.workspaceRoot + '/' + relativePath : state.workspaceRoot;
}

function absFilePath(relativePath, name) {
  const rp = fullPath(relativePath, name);
  return state.workspaceRoot + '/' + rp;
}

function formatMtime(mtime) {
  if (!mtime) return '—';
  const d = new Date(mtime);
  const now = new Date();
  const diffMs = now - d;
  const diffMin = Math.floor(diffMs / 60000);
  if (diffMin < 1) return 'just now';
  if (diffMin < 60) return diffMin + ' min ago';
  const diffHr = Math.floor(diffMin / 60);
  if (diffHr < 24) return diffHr + ' hr ago';
  const diffDay = Math.floor(diffHr / 24);
  if (diffDay < 30) return diffDay + ' day ago';
  return d.toLocaleDateString();
}

async function fetchDirectory(relativePath) {
  const dirPath = absPath(relativePath);
  const url = `${API_BASE}/files?path=${encodeURIComponent(dirPath)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const entries = await res.json();
  state.directoryCache[relativePath] = entries;
  return entries;
}

async function fetchFile(relativePath, name) {
  const fp = absFilePath(relativePath, name);
  const url = `${API_BASE}/files/read?path=${encodeURIComponent(fp)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const data = await res.json();
  const key = fullPath(relativePath, name);
  state.files[key] = data;
  return data;
}

async function createFile(dirRelPath, name, type, content) {
  const dirPath = absPath(dirRelPath);
  const url = `${API_BASE}/files/create?path=${encodeURIComponent(dirPath)}`;
  const body = { name };
  if (type === 'directory') body.type = 'directory';
  if (content) body.content = content;
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  // Invalidate cache
  delete state.directoryCache[dirRelPath];
  return await res.json();
}

async function writeFile(relativePath, name, content) {
  const fp = absFilePath(relativePath, name);
  const url = `${API_BASE}/files/write?path=${encodeURIComponent(fp)}`;
  const res = await fetch(url, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ content }),
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  // Invalidate file cache
  const key = fullPath(relativePath, name);
  delete state.files[key];
  return true;
}

async function archiveFile(dirRelPath, name) {
  const fp = absFilePath(dirRelPath, name);
  const url = `${API_BASE}/files/archive`;
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ path: fp }),
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  // Invalidate dir cache
  delete state.directoryCache[dirRelPath];
  return true;
}

// ── Render functions ───────────────────────────────────
function updateBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  const workspaceName = state.workspaceRoot ? state.workspaceRoot.split('/').pop() : 'cammander';
  const segments = [workspaceName, ...(state.currentPath ? state.currentPath.split('/').filter(Boolean) : [])];
  let html = '';
  segments.forEach((seg, i) => {
    const isCurrent = i === segments.length - 1;
    const crumbClass = isCurrent ? 'crumb crumb--current' : 'crumb';
    html += `<span class="${crumbClass}" data-nav-depth="${i}">${seg}</span>`;
    if (i < segments.length - 1) {
      html += '<span class="sep">/</span>';
    }
  });
  bc.innerHTML = html;

  // Attach click handlers
  bc.querySelectorAll('.crumb').forEach(el => {
    el.addEventListener('click', () => {
      const depth = parseInt(el.dataset.navDepth) || 0;
      navigateToDepth(depth);
    });
  });
}

function navigateToDepth(depth) {
  if (depth === 0) {
    state.currentPath = '';
  } else {
    const segments = state.currentPath.split('/').filter(Boolean);
    state.currentPath = segments.slice(0, depth - 1).join('/');
  }
  state.currentView = 'folder';
  render();
}

async function renderFolderView() {
  const container = document.getElementById('folder-view');

  // Show loading state
  container.innerHTML = `
    <div class="folder-view">
      <div class="folder-loading">Loading...</div>
    </div>`;

  let entries;
  try {
    entries = await fetchDirectory(state.currentPath);
  } catch (e) {
    container.innerHTML = `
      <div class="folder-view">
        <div class="folder-empty">
          <div class="folder-empty-icon">⚠️</div>
          <h3>Error loading directory</h3>
          <p>${escapeHtml(e.message)}</p>
        </div>
      </div>`;
    return;
  }

  state.currentDir = entries;

  if (!entries || entries.length === 0) {
    const dirName = state.currentPath ? state.currentPath.split('/').pop() : (state.workspaceRoot ? state.workspaceRoot.split('/').pop() : 'cammander');
    container.innerHTML = `
      <div class="folder-view">
        <div class="folder-header">
          <h2>${escapeHtml(dirName)}</h2>
          <div class="folder-header-right">
            <button class="icon-btn" title="New file" data-action="new-file">+</button>
          </div>
        </div>
        <div class="folder-empty">
          <div class="folder-empty-icon">📂</div>
          <h3>This folder is empty</h3>
          <p>Create files or open a different workspace</p>
        </div>
      </div>`;
    wireNewFileButton(container);
    return;
  }

  // Sort: directories first, then files
  const sorted = [...entries].sort((a, b) => {
    if (a.type !== b.type) return a.type === 'directory' ? -1 : 1;
    return a.name.localeCompare(b.name);
  });

  const dirName = state.currentPath ? state.currentPath.split('/').pop() : (state.workspaceRoot ? state.workspaceRoot.split('/').pop() : 'cammander');

  let itemsHtml = '';
  if (state.viewMode === 'grid') {
    itemsHtml = `<div class="folder-grid">`;
    for (const item of sorted) {
      const isDir = item.type === 'directory';
      const icon = fileIcon(item.name, isDir);
      const iconClass = isDir ? 'file-card-icon file-card-icon--dir' : 'file-card-icon';
      const size = isDir ? '—' : formatSize(item.size || 0);
      const isImg = !isDir && isImageFile(item.name);
      const archiveBtn = (!isDir && !isImg) ? `<button class="file-action-btn" title="Archive" data-action="archive" data-name="${escapeHtml(item.name)}">📁</button>` : '';
      itemsHtml += `
        <div class="file-card" data-name="${escapeHtml(item.name)}" data-type="${item.type}">
          <div class="file-card-actions">${archiveBtn}</div>
          <div class="${iconClass}">${icon}</div>
          <div class="file-card-name">${escapeHtml(item.name)}</div>
          <div class="file-card-meta">${size}</div>
        </div>`;
    }
    itemsHtml += `</div>`;
  } else {
    itemsHtml = `<div class="folder-list">`;
    for (const item of sorted) {
      const isDir = item.type === 'directory';
      const icon = fileIcon(item.name, isDir);
      const iconClass = isDir ? 'file-row-icon file-row-icon--dir' : 'file-row-icon';
      const size = isDir ? '—' : formatSize(item.size || 0);
      const mtime = formatMtime(item.mtime);
      const isImg = !isDir && isImageFile(item.name);
      const archiveBtn = (!isDir && !isImg) ? `<button class="file-action-btn" title="Archive" data-action="archive" data-name="${escapeHtml(item.name)}">📁</button>` : '';
      itemsHtml += `
        <div class="file-row" data-name="${escapeHtml(item.name)}" data-type="${item.type}">
          <div class="${iconClass}">${icon}</div>
          <div class="file-row-name">${escapeHtml(item.name)}</div>
          <div class="file-row-size">${size}</div>
          <div class="file-row-date">${mtime}</div>
          <div class="file-row-actions">${archiveBtn}</div>
        </div>`;
    }
    itemsHtml += `</div>`;
  }

  container.innerHTML = `
    <div class="folder-view">
      <div class="folder-header">
        <h2>${escapeHtml(dirName)}</h2>
        <div class="folder-header-right">
          <button class="icon-btn" title="New file" data-action="new-file">+</button>
        </div>
      </div>
      ${itemsHtml}
    </div>`;

  // Attach file/folder click handlers
  container.querySelectorAll('.file-card, .file-row').forEach(el => {
    el.addEventListener('click', (e) => {
      // Don't navigate if clicking an action button
      if (e.target.closest('.file-action-btn') || e.target.closest('.file-card-actions') || e.target.closest('.file-row-actions')) return;
      const name = el.dataset.name;
      const type = el.dataset.type;
      if (type === 'directory') {
        state.currentPath = fullPath(state.currentPath, name);
        state.currentView = 'folder';
        render();
      } else {
        openFile(name);
      }
    });
  });

  // Attach archive button handlers
  container.querySelectorAll('[data-action="archive"]').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const name = btn.dataset.name;
      if (confirm(`Archive ${name}?`)) {
        try {
          await archiveFile(state.currentPath, name);
          render(); // re-fetches directory
        } catch (err) {
          alert('Archive failed: ' + err.message);
        }
      }
    });
  });

  wireNewFileButton(container);
}

function wireNewFileButton(container) {
  const btn = container.querySelector('[data-action="new-file"]');
  if (btn) {
    btn.addEventListener('click', () => {
      document.getElementById('newfile-overlay').classList.remove('newfile-overlay--hidden');
      document.getElementById('newfile-name').focus();
    });
  }
}

function openFile(name) {
  const filePath = fullPath(state.currentPath, name);
  // Add tab if not open
  if (!state.openTabs.find(t => t.path === filePath)) {
    state.openTabs.push({ path: filePath, name, dirPath: state.currentPath, modified: false });
  }
  state.activeTab = filePath;
  state.currentView = 'editor';
  state.editingFile = false;
  render();
}

async function renderEditorView() {
  const container = document.getElementById('editor-view');
  const tab = state.openTabs.find(t => t.path === state.activeTab);
  const fileName = tab ? tab.name : 'No file';
  const dirPath = tab ? tab.dirPath : '';

  // Render tabs
  let tabsHtml = '<div class="editor-tabs-row">';
  for (const t of state.openTabs) {
    const isActive = t.path === state.activeTab;
    tabsHtml += `
      <button class="editor-tab ${isActive ? 'editor-tab--active' : ''}" data-tab-path="${t.path}">
        <span>${escapeHtml(t.name)}</span>
        ${t.modified ? '<span style="color:#b8860b;font-size:8px;">●</span>' : ''}
        <span class="editor-tab-close" data-tab-close="${t.path}">✕</span>
      </button>`;
  }
  tabsHtml += '</div>';

  // Show loading initially
  container.innerHTML = `
    <div class="editor-view">
      <div class="editor-back-bar">
        <button class="back-btn" id="back-btn">← Back</button>
        <span class="editor-file-name">${escapeHtml(fileName)}</span>
        <button class="edit-btn" id="edit-btn">✏ Edit</button>
      </div>
      ${tabsHtml}
      <div class="folder-loading">Loading file...</div>
    </div>`;

  // Back button
  container.querySelector('#back-btn').addEventListener('click', () => {
    state.currentView = 'folder';
    state.editingFile = false;
    render();
  });

  // Edit button
  container.querySelector('#edit-btn').addEventListener('click', () => {
    state.editingFile = true;
    renderEditorView();
  });

  // Tab clicks
  container.querySelectorAll('.editor-tab').forEach(el => {
    el.addEventListener('click', (e) => {
      if (e.target.classList.contains('editor-tab-close')) return;
      state.activeTab = el.dataset.tabPath;
      state.editingFile = false;
      render();
    });
  });

  container.querySelectorAll('.editor-tab-close').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      const closePath = el.dataset.tabClose;
      state.openTabs = state.openTabs.filter(t => t.path !== closePath);
      if (state.activeTab === closePath) {
        state.activeTab = state.openTabs.length > 0 ? state.openTabs[state.openTabs.length - 1].path : '';
        if (state.openTabs.length === 0) {
          state.currentView = 'folder';
        }
      }
      state.editingFile = false;
      render();
    });
  });

  // Fetch file content
  let fileData;
  try {
    fileData = await fetchFile(dirPath, fileName);
  } catch (e) {
    const codeArea = container.querySelector('.folder-loading');
    if (codeArea) codeArea.outerHTML = `<div class="code-area"><div class="code-line"><span class="line-content" style="color:#dc2626;">Error: ${escapeHtml(e.message)}</span></div></div>`;
    return;
  }

  if (fileData.type === 'image') {
    // Image viewer
    const contentArea = container.querySelector('.folder-loading');
    if (contentArea) {
      contentArea.outerHTML = `<div class="image-viewer"><img src="${fileData.data}" alt="${escapeHtml(fileName)}"></div>`;
    }
    // Hide edit button for images
    const editBtn = container.querySelector('#edit-btn');
    if (editBtn) editBtn.style.display = 'none';
    return;
  }

  // Text file
  const content = fileData.content || '';

  if (state.editingFile) {
    // Edit mode — highlighted backdrop + transparent textarea overlay
    const lang = langFromPath(state.activeTab || 'txt');
    const lines = content.split('\n');
    let backdropHtml = '<div class="editor-highlight-backdrop" id="editor-backdrop">';
    lines.forEach((line, i) => {
      const num = String(i + 1).padStart(4);
      backdropHtml += `<div class="code-line"><span class="line-num">${num}</span><span class="line-content">${highlightCode(line, lang)}</span></div>`;
    });
    backdropHtml += '</div>';

    const contentArea = container.querySelector('.folder-loading');
    if (contentArea) {
      contentArea.outerHTML = `
        <div class="editor-textarea-wrap">
          ${backdropHtml}
          <textarea class="editor-textarea" id="editor-textarea" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off">${escapeHtml(content)}</textarea>
        </div>
        <div class="editor-toolbar">
          <button class="editor-toolbar-btn editor-toolbar-btn--save" id="editor-save">Save</button>
          <button class="editor-toolbar-btn" id="editor-cancel">Cancel</button>
        </div>`;
    }

    const textarea = container.querySelector('#editor-textarea');
    const backdrop = container.querySelector('#editor-backdrop');

    // Sync scroll between textarea and backdrop
    if (textarea && backdrop) {
      textarea.addEventListener('scroll', () => {
        backdrop.scrollTop = textarea.scrollTop;
        backdrop.scrollLeft = textarea.scrollLeft;
      });
    }

    // Live syntax re-highlight on input
    if (textarea && backdrop) {
      textarea.addEventListener('input', () => {
        const t = state.openTabs.find(t => t.path === state.activeTab);
        if (t) t.modified = true;
        // Re-render the backdrop
        const newLines = textarea.value.split('\n');
        let html = '';
        newLines.forEach((line, i) => {
          const num = String(i + 1).padStart(4);
          html += `<div class="code-line"><span class="line-num">${num}</span><span class="line-content">${highlightCode(line, lang)}</span></div>`;
        });
        backdrop.innerHTML = html;
      });
    }

    // Handle Tab key in textarea
    if (textarea) {
      textarea.addEventListener('keydown', (e) => {
        if (e.key === 'Tab') {
          e.preventDefault();
          const start = textarea.selectionStart;
          const end = textarea.selectionEnd;
          textarea.value = textarea.value.substring(0, start) + '  ' + textarea.value.substring(end);
          textarea.selectionStart = textarea.selectionEnd = start + 2;
          textarea.dispatchEvent(new Event('input'));
        }
      });
      textarea.focus();
    }

    const saveBtn = container.querySelector('#editor-save');
    if (saveBtn) {
      saveBtn.addEventListener('click', async () => {
        const newContent = textarea.value;
        try {
          await writeFile(dirPath, fileName, newContent);
          state.editingFile = false;
          // Mark tab as not modified
          const t = state.openTabs.find(t => t.path === state.activeTab);
          if (t) t.modified = false;
          render();
        } catch (err) {
          alert('Save failed: ' + err.message);
        }
      });
    }

    const cancelBtn = container.querySelector('#editor-cancel');
    if (cancelBtn) {
      cancelBtn.addEventListener('click', () => {
        state.editingFile = false;
        render();
      });
    }

    // Track modifications
    if (textarea) {
      textarea.addEventListener('input', () => {
        const t = state.openTabs.find(t => t.path === state.activeTab);
        if (t) t.modified = true;
      });
    }
  } else {
    // Read-only mode with line numbers + syntax highlighting
    const lang = langFromPath(state.activeTab || 'txt');
    const lines = content.split('\n');
    let codeHtml = '<div class="code-area">';
    lines.forEach((line, i) => {
      const num = String(i + 1).padStart(4);
      codeHtml += `<div class="code-line"><span class="line-num">${num}</span><span class="line-content">${highlightCode(line, lang)}</span></div>`;
    });
    codeHtml += '</div>';

    const contentArea = container.querySelector('.folder-loading');
    if (contentArea) contentArea.outerHTML = codeHtml;
  }
}

// ── Syntax Highlighting ────────────────────────────────
// Lightweight regex-based highlighter for the prototype.
// Supports: JS/TS, Python, Rust, Go, Shell, YAML, TOML, CSV, Markdown, Dockerfile, SQL, JSON, HTML/CSS, .env

const HIGHLIGHT_RULES = {
  // Language IDs keyed by file extension
  js: 'javascript', mjs: 'javascript', cjs: 'javascript', jsx: 'javascript',
  ts: 'typescript', tsx: 'typescript',
  py: 'python', pyw: 'python',
  rs: 'rust',
  go: 'go',
  sh: 'shell', bash: 'shell', zsh: 'shell',
  yaml: 'yaml', yml: 'yaml',
  toml: 'toml',
  csv: 'csv', tsv: 'csv',
  md: 'markdown', markdown: 'markdown',
  sql: 'sql',
  json: 'json', jsonc: 'json',
  html: 'html', htm: 'html', svg: 'html',
  css: 'css', scss: 'scss',
  dockerfile: 'dockerfile',
  env: 'dotenv',
  xml: 'xml',
};

function langFromPath(filePath) {
  const name = filePath.split('/').pop() ?? '';
  const lower = name.toLowerCase();
  if (lower === 'dockerfile' || lower.startsWith('dockerfile.')) return 'dockerfile';
  if (lower === 'makefile') return 'makefile';
  if (lower === '.env' || lower.startsWith('.env.')) return 'dotenv';
  if (lower === '.gitignore' || lower === '.dockerignore') return 'shell';
  if (lower === 'cargo.toml' || lower === 'pyproject.toml') return 'toml';
  if (lower === 'go.mod' || lower === 'go.sum') return 'go';
  if (lower === 'package.json' || lower === 'tsconfig.json') return 'json';
  if (lower === 'cargo.lock' || lower === 'package-lock.json') return 'json';
  const ext = name.includes('.') ? name.split('.').pop() : '';
  return HIGHLIGHT_RULES[ext] ?? ext;
}

// Token types and their CSS classes
const TK = {
  KW:  'kw',   // keywords
  KW2: 'kw2',  // built-in constants (true, false, null, None)
  STR: 'str',  // strings
  NUM: 'num',  // numbers
  CM:  'cm',   // comments
  FN:  'fn',   // function calls
  TP:  'tp',   // types/classes
  DEC: 'dec',  // decorators/attributes
  OP:  'op',   // operators
  PN:  'pn',   // punctuation brackets
};

// Order matters — earlier rules take priority
function buildRules(lang) {
  const rules = [];

  // ── Universal rules (all languages) ──
  // Multi-line strings (triple quotes) — must come before single-line strings
  if (lang === 'python' || lang === 'toml') {
    rules.push([/"""[\s\S]*?"""/g, TK.STR], [/'''[\s\S]*?'''/g, TK.STR]);
  }
  if (lang === 'javascript' || lang === 'typescript') {
    rules.push([/```[\s\S]*?```/g, TK.STR]); // template literal spans (approx)
  }

  // Comments
  if (lang === 'python' || lang === 'toml' || lang === 'shell' || lang === 'dockerfile' || lang === 'yaml' || lang === 'dotenv') {
    rules.push([/#.*$/gm, TK.CM]);
  } else if (lang === 'rust') {
    rules.push([/\/\/.*$/gm, TK.CM], [/\/\*[\s\S]*?\*\//g, TK.CM]);
  } else if (lang === 'html' || lang === 'xml' || lang === 'svg') {
    rules.push([/<!--[\s\S]*?-->/g, TK.CM]);
  } else if (lang === 'css' || lang === 'scss') {
    rules.push([/\/\*[\s\S]*?\*\//g, TK.CM]);
  } else if (lang === 'sql') {
    rules.push([/--.*$/gm, TK.CM], [/\/\*[\s\S]*?\*\//g, TK.CM]);
  } else if (lang === 'csv' || lang === 'json' || lang === 'jsonc') {
    // JSON/CSV — no line comments standard; jsonc uses //
    if (lang === 'jsonc') rules.push([/\/\/.*$/gm, TK.CM]);
  } else if (lang === 'markdown') {
    // Markdown comments rare; just HTML-style
    rules.push([/<!--[\s\S]*?-->/g, TK.CM]);
  } else {
    // JS/TS/go/tsx — // and /* */
    rules.push([/\/\/.*$/gm, TK.CM], [/\/\*[\s\S]*?\*\//g, TK.CM]);
  }

  // Strings (single, double, backtick, f-strings)
  if (lang === 'python') {
    rules.push([/f"""[\s\S]*?"""/g, TK.STR], [/f'''[\s\S]*?'''/g, TK.STR]);
    rules.push([/f"[^"\n]*"/g, TK.STR], [/f'[^'\n]*'/g, TK.STR]);
  }
  rules.push([/"(?:[^"\\]|\\.)*"/g, TK.STR]);  // double-quoted
  rules.push([/'(?:[^'\\]|\\.)*'/g, TK.STR]);  // single-quoted
  if (lang === 'javascript' || lang === 'typescript' || lang === 'go') {
    rules.push([/`(?:[^`\\]|\\.)*`/g, TK.STR]);  // template literals / raw strings
  }

  // Numbers (hex, binary, floats)
  if (lang === 'python') {
    rules.push([/\b0x[0-9a-fA-F_]+n?\b/g, TK.NUM], [/\b0o[0-7_]+\b/g, TK.NUM], [/\b0b[01_]+\b/g, TK.NUM]);
  }
  rules.push([/\b0x[0-9a-fA-F]+n?\b/g, TK.NUM]);
  rules.push([/\b\d+\.?\d*([eE][+-]?\d+)?n?\b/g, TK.NUM]);

  // Language-specific keywords
  const JS_KW = 'break|case|catch|class|const|continue|debugger|default|delete|do|else|export|extends|finally|for|from|function|if|import|in|instanceof|let|new|of|return|static|super|switch|this|throw|try|typeof|var|void|while|with|yield|async|await|enum|implements|interface|package|private|protected|public|abstract|as|declare|get|set|type|namespace|module|require|override|readonly|keyof|infer|asserts|is|unique|symbol';
  const JS_CONST = 'true|false|null|undefined|NaN|Infinity|console|window|document|Math|JSON|Object|Array|String|Number|Boolean|Date|RegExp|Map|Set|Promise|Error|Symbol|BigInt|parseInt|parseFloat|isNaN|isFinite|encodeURI|decodeURI|encodeURIComponent|decodeURIComponent|alert|setTimeout|setInterval|clearTimeout|clearInterval|requestAnimationFrame|fetch|process|Buffer|module|exports|globalThis|self|Reflect|Proxy|WeakMap|WeakSet|ArrayBuffer|SharedArrayBuffer|DataView|Float32Array|Float64Array|Int8Array|Int16Array|Int32Array|Uint8Array|Uint16Array|Uint32Array|Uint8ClampedArray';

  const PY_KW = 'False|None|True|and|as|assert|async|await|break|class|continue|def|del|elif|else|except|finally|for|from|global|if|import|in|is|lambda|nonlocal|not|or|pass|raise|return|try|while|with|yield';
  const PY_BUILTIN = 'print|len|range|int|str|float|list|dict|tuple|set|bool|type|isinstance|hasattr|getattr|setattr|super|property|staticmethod|classmethod|enumerate|zip|map|filter|sorted|reversed|iter|next|open|input|abs|max|min|sum|any|all|round|hex|oct|bin|ord|chr|id|hash|repr|format|dir|vars|callable|eval|exec|compile|__import__|Exception|ValueError|TypeError|KeyError|IndexError|AttributeError|RuntimeError|StopIteration|NotImplementedError|IOError|OSError|ArithmeticError|LookupError';

  const RS_KW = 'as|async|await|break|const|continue|crate|dyn|else|enum|extern|fn|for|if|impl|in|let|loop|match|mod|move|mut|pub|ref|return|self|Self|static|struct|super|trait|type|unsafe|use|where|while|yield';
  const RS_CONST = 'true|false|Some|None|Ok|Err|Self|bool|char|f32|f64|i8|i16|i32|i64|i128|isize|str|u8|u16|u32|u64|u128|usize|String|Vec|Box|Rc|Arc|Option|Result|println|print|eprintln|eprint|panic|assert|assert_eq|assert_ne|todo|unimplemented|unreachable|dbg|vec|format';

  const GO_KW = 'break|case|chan|const|continue|default|defer|else|fallthrough|for|func|go|goto|if|import|interface|map|package|range|return|select|struct|switch|type|var';
  const GO_CONST = 'true|false|nil|iota| len|cap|append|copy|delete|make|new|close|panic|recover|print|println|complex|real|imag|error|string|int|int8|int16|int32|int64|uint|uint8|uint16|uint32|uint64|float32|float64|bool|byte|rune|any|comparable';

  const SH_KW = 'if|then|else|elif|fi|for|while|until|do|done|case|esac|in|function|select|time|coproc|return|exit|break|continue|declare|export|local|readonly|typeset|unset|source|alias|bg|cd|echo|enable|eval|exec|exit|fg|hash|help|history|jobs|kill|let|logout|mapfile|popd|printf|pushd|pwd|read|readarray|shift|shopt|test|times|trap|type|ulimit|umask|unalias|wait';

  const SQL_KW = 'SELECT|FROM|WHERE|INSERT|INTO|VALUES|UPDATE|SET|DELETE|CREATE|TABLE|ALTER|DROP|INDEX|JOIN|LEFT|RIGHT|INNER|OUTER|ON|AND|OR|NOT|IN|BETWEEN|LIKE|IS|NULL|ORDER|BY|GROUP|HAVING|LIMIT|OFFSET|UNION|ALL|AS|DISTINCT|COUNT|SUM|AVG|MIN|MAX|EXISTS|CASE|WHEN|THEN|ELSE|END|BEGIN|COMMIT|ROLLBACK|GRANT|REVOKE|PRIMARY|KEY|FOREIGN|REFERENCES|CONSTRAINT|DEFAULT|CHECK|UNIQUE|AUTO_INCREMENT|VARCHAR|INTEGER|TEXT|BOOLEAN|FLOAT|DATE|TIMESTAMP|SERIAL|BIGSERIAL';

  switch (lang) {
    case 'javascript': case 'typescript':
      rules.push([new RegExp(`\\b(${JS_KW})\\b`, 'g'), TK.KW]);
      rules.push([new RegExp(`\\b(${JS_CONST})\\b`, 'g'), TK.KW2]);
      rules.push([/\b[A-Z][a-zA-Z0-9]*\b/g, TK.TP]); // PascalCase = type
      break;
    case 'python':
      rules.push([new RegExp(`\\b(${PY_KW})\\b`, 'g'), TK.KW]);
      rules.push([new RegExp(`\\b(${PY_BUILTIN})\\b`, 'g'), TK.FN]);
      rules.push([/@[\w.]+/g, TK.DEC]); // decorators
      rules.push([/\bclass\s+([A-Z]\w*)/g, TK.TP]); // class definitions
      rules.push([/\b[A-Z][a-zA-Z0-9_]*\b/g, TK.TP]); // PascalCase classes
      break;
    case 'rust':
      rules.push([new RegExp(`\\b(${RS_KW})\\b`, 'g'), TK.KW]);
      rules.push([new RegExp(`\\b(${RS_CONST})\\b`, 'g'), TK.KW2]);
      rules.push([/\b[A-Z][a-zA-Z0-9]*\b/g, TK.TP]);
      rules.push([/#\[(\w+)\]/g, TK.DEC]); // attributes
      break;
    case 'go':
      rules.push([new RegExp(`\\b(${GO_KW})\\b`, 'g'), TK.KW]);
      rules.push([new RegExp(`\\b(${GO_CONST})\\b`, 'g'), TK.KW2]);
      rules.push([/\b[A-Z][a-zA-Z0-9]*\b/g, TK.TP]);
      break;
    case 'shell':
      rules.push([new RegExp(`\\b(${SH_KW})\\b`, 'g'), TK.KW]);
      rules.push([/\$\{[^}]+\}/g, TK.KW2]); // ${var}
      rules.push([/\$[A-Za-z_]\w*/g, TK.KW2]); // $var
      break;
    case 'yaml': case 'toml':
      rules.push([/^\s*[\w.-]+(?=\s*[:=])/gm, TK.FN]); // keys
      rules.push([/\b(true|false|yes|no|on|off|null|True|False)\b/g, TK.KW2]);
      break;
    case 'sql':
      rules.push([new RegExp(`\\b(${SQL_KW})\\b`, 'gi'), TK.KW]);
      break;
    case 'html': case 'svg': case 'xml':
      rules.push([/<\/?[\w-]+/g, TK.KW]); // tags
      rules.push([/\b[\w-]+(?==)/g, TK.KW2]); // attributes
      break;
    case 'css': case 'scss':
      rules.push([/@[\w-]+/g, TK.DEC]); // @rules
      rules.push([/#[\w-]+/g, TK.FN]); // #id selectors
      rules.push([/^\s*[\w.-]+\s*:/gm, TK.KW]); // property: value
      break;
    case 'markdown':
      rules.push([/^#{1,6}\s.+$/gm, TK.KW]); // headings
      rules.push([/\*\*[^*]+\*\*/g, TK.KW2], [/__[^_]+__/g, TK.KW2]); // bold
      rules.push([/\*[^*]+\*/g, TK.FN], [/_[^_]+_/g, TK.FN]); // italic
      rules.push([/`[^`]+`/g, TK.STR]); // inline code
      rules.push([/\[([^\]]+)\]\([^)]+\)/g, TK.FN]); // links
      rules.push([/^>\s.+$/gm, TK.CM]); // blockquotes
      rules.push([/^[-*+]\s/gm, TK.KW2], [/^\d+\.\s/gm, TK.KW2]); // lists
      break;
    case 'dockerfile':
      rules.push([/^(FROM|RUN|CMD|LABEL|MAINTAINER|EXPOSE|ENV|ADD|COPY|ENTRYPOINT|VOLUME|USER|WORKDIR|ARG|ONBUILD|STOPSIGNAL|HEALTHCHECK|SHELL)\b/gim, TK.KW]);
      rules.push([/\$\{[^}]+\}/g, TK.KW2], [/\$[A-Za-z_]\w*/g, TK.KW2]);
      break;
    case 'dotenv':
      rules.push([/^\s*[A-Z_]\w*(?==)/gm, TK.FN]); // VAR=
      break;
    case 'csv':
      // CSV highlighting is minimal — just highlight delimiters
      rules.push([/,/g, TK.OP]);
      break;
  }

  // Function calls (most languages): word followed by (
  if (lang !== 'csv' && lang !== 'markdown' && lang !== 'yaml' && lang !== 'toml' && lang !== 'dockerfile' && lang !== 'dotenv') {
    rules.push([/\b([a-z_]\w*)\s*(?=\()/g, TK.FN]);
  }

  // Punctuation brackets
  rules.push([/[{}()\[\]]/g, TK.PN]);

  return rules;
}

// Highlight a line of code — runs regex rules in priority order
function highlightCode(text, lang) {
  const rules = buildRules(lang);
  if (!rules.length) return escapeHtml(text);

  // Build a mask: for each char position, store {token, cls}
  const chars = new Array(text.length);
  for (let i = 0; i < chars.length; i++) chars[i] = null;

  for (const [regex, cls] of rules) {
    regex.lastIndex = 0;
    let m;
    while ((m = regex.exec(text)) !== null) {
      const start = m.index;
      const end = start + m[0].length;
      // Only mark positions that aren't already claimed
      let claimed = false;
      for (let i = start; i < end; i++) { if (chars[i] !== null) { claimed = true; break; } }
      if (!claimed) {
        for (let i = start; i < end; i++) chars[i] = cls;
        // Mark the group span
      }
    }
  }

  // Build output: escape HTML and wrap claimed spans with <span class="...">
  let result = '';
  let i = 0;
  while (i < chars.length) {
    if (chars[i] === null) {
      // Plain text — escape and advance
      result += escapeHtml(text[i]);
      i++;
    } else {
      const cls = chars[i];
      let j = i;
      while (j < chars.length && chars[j] === cls) j++;
      result += `<span class="${cls}">${escapeHtml(text.slice(i, j))}</span>`;
      i = j;
    }
  }
  return result;
}

// ── Terminal (real xterm.js + WebSocket) ────────────────
let xtermInstance = null;
let termSocket = null;
let termFitAddon = null;

function initTerminal() {
  const container = document.getElementById('xterm-container');
  if (!container || !window.Terminal) return;

  // Clean up old instance
  if (xtermInstance) {
    xtermInstance.dispose();
    xtermInstance = null;
  }
  if (termSocket) {
    termSocket.disconnect();
    termSocket = null;
  }

  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  xtermInstance = new window.Terminal({
    cursorBlink: true,
    cursorStyle: 'bar',
    fontSize: 13,
    fontFamily: "'SF Mono','Fira Code',Consolas,monospace",
    theme: isDark ? {
      background: '#1a1a2e',
      foreground: '#e4e4ef',
      cursor: '#f97316',
      selectionBackground: 'rgba(249,115,22,0.25)',
      black: '#45475a',
      red: '#f38ba8',
      green: '#4ade80',
      yellow: '#f9e2af',
      blue: '#89b4fa',
      magenta: '#f9a8d4',
      cyan: '#94e2d5',
      white: '#bac2de',
      brightBlack: '#585b70',
      brightRed: '#f38ba8',
      brightGreen: '#86efac',
      brightYellow: '#f9e2af',
      brightBlue: '#89b4fa',
      brightMagenta: '#f5c2e7',
      brightCyan: '#94e2d5',
      brightWhite: '#e4e4ef',
    } : {
      background: '#1e1e2e',
      foreground: '#cdd6f4',
      cursor: '#f5e0dc',
      selectionBackground: 'rgba(203,166,247,0.3)',
      black: '#45475a',
      red: '#f38ba8',
      green: '#a6e3a1',
      yellow: '#f9e2af',
      blue: '#89b4fa',
      magenta: '#f5c2e7',
      cyan: '#94e2d5',
      white: '#bac2de',
      brightBlack: '#585b70',
      brightRed: '#f38ba8',
      brightGreen: '#a6e3a1',
      brightYellow: '#f9e2af',
      brightBlue: '#89b4fa',
      brightMagenta: '#f5c2e7',
      brightCyan: '#94e2d5',
      brightWhite: '#a6adc8',
    },
    allowProposedApi: true,
  });

  termFitAddon = new window.FitAddon.FitAddon();
  xtermInstance.loadAddon(termFitAddon);
  xtermInstance.open(container);
  termFitAddon.fit();

  // Connect WebSocket to backend terminal gateway
  const wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const wsUrl = `${wsProto}//${location.host}`;
  termSocket = window.io(wsUrl, {
    path: '/terminal',
    transports: ['polling', 'websocket'],
    reconnection: true,
  });

  termSocket.on('connect', () => {
    const cwd = state.workspaceRoot || undefined;
    termSocket.emit('terminal:create', {
      cwd,
      cols: xtermInstance.cols,
      rows: xtermInstance.rows,
    });
  });

  termSocket.on('terminal:data', (data) => {
    xtermInstance.write(data);
  });

  termSocket.on('terminal:exit', ({ exitCode }) => {
    xtermInstance.write(`\r\n\x1b[90m[Process exited with code ${exitCode}]\x1b[0m\r\n`);
  });

  termSocket.on('disconnect', () => {
    xtermInstance.write('\r\n\x1b[31m[Disconnected]\x1b[0m\r\n');
  });

  // Input → server
  xtermInstance.onData((data) => {
    termSocket.emit('terminal:input', { data });
  });

  // Resize
  const resizeObserver = new ResizeObserver(() => {
    if (termFitAddon && xtermInstance) {
      termFitAddon.fit();
      termSocket.emit('terminal:resize', { cols: xtermInstance.cols, rows: xtermInstance.rows });
    }
  });
  resizeObserver.observe(container);
}

function renderTerminal() {
  // Just init the terminal if not already done
  if (!xtermInstance) {
    initTerminal();
  }
}

// ── Main render ────────────────────────────────────────
async function render() {
  const folderPanel = document.getElementById('folder-view');
  const editorPanel = document.getElementById('editor-view');

  if (state.currentView === 'folder') {
    folderPanel.className = 'view-panel view-panel--folder';
    editorPanel.className = 'view-panel view-panel--editor';
    editorPanel.innerHTML = '';
    await renderFolderView();
  } else {
    folderPanel.className = 'view-panel view-panel--folder slide-out';
    editorPanel.className = 'view-panel view-panel--editor slide-in';
    await renderEditorView();
  }

  updateBreadcrumb();

  // Update view mode buttons
  document.getElementById('btn-toggle-grid').className = state.viewMode === 'grid'
    ? 'topbar-btn topbar-btn--active' : 'topbar-btn';
  document.getElementById('btn-toggle-list').className = state.viewMode === 'list'
    ? 'topbar-btn topbar-btn--active' : 'topbar-btn';
}

// ── Event handlers ─────────────────────────────────────
document.getElementById('btn-toggle-grid').addEventListener('click', () => {
  state.viewMode = 'grid';
  render();
});

document.getElementById('btn-toggle-list').addEventListener('click', () => {
  state.viewMode = 'list';
  render();
});

function updateTerminalLayout() {
  const panel = document.getElementById('terminal-panel');
  const viewStack = document.getElementById('view-stack');
  const statusBar = document.querySelector('.statusbar');
  if (state.terminalMaximized) {
    viewStack.style.display = 'none';
    statusBar.style.display = 'none';
  } else {
    viewStack.style.display = '';
    statusBar.style.display = '';
  }
}

// Update main-split layout class based on chat/terminal state
function updateMainLayout() {
  const mainSplit = document.getElementById('main-split');
  const termOpen = state.terminalExpanded || state.terminalMaximized;
  const chatOpen = state.chatExpanded;
  mainSplit.classList.remove('main-split--dual', 'main-split--chat');
  if (chatOpen && termOpen) {
    mainSplit.classList.add('main-split--dual');
  } else if (chatOpen) {
    mainSplit.classList.add('main-split--chat');
  }
  // If only terminal or neither: default grid (content full width, terminal below)
  // Trigger terminal fit after layout change
  if (xtermInstance && termFitAddon) {
    requestAnimationFrame(() => termFitAddon.fit());
  }
}

document.getElementById('btn-terminal').addEventListener('click', () => {
  const panel = document.getElementById('terminal-panel');
  const btn = document.getElementById('term-maximize');
  if (state.terminalMaximized) {
    state.terminalMaximized = false;
    state.terminalExpanded = false;
    panel.className = 'terminal-panel terminal-panel--collapsed';
    btn.textContent = '⬜';
  } else if (state.terminalExpanded) {
    state.terminalMaximized = true;
    panel.className = 'terminal-panel terminal-panel--maximized';
    btn.textContent = '⛶';
  } else {
    state.terminalExpanded = true;
    panel.className = 'terminal-panel terminal-panel--expanded';
    btn.textContent = '⬜';
  }
  updateTerminalLayout();
  updateMainLayout();
  renderTerminal();
});

document.getElementById('btn-chat').addEventListener('click', () => {
  state.chatExpanded = !state.chatExpanded;
  const panel = document.getElementById('chat-panel');
  panel.className = state.chatExpanded
    ? 'chat-panel chat-panel--expanded'
    : 'chat-panel chat-panel--collapsed';
  updateMainLayout();
});

document.getElementById('chat-close').addEventListener('click', () => {
  state.chatExpanded = false;
  document.getElementById('chat-panel').className = 'chat-panel chat-panel--collapsed';
  updateMainLayout();
});

document.getElementById('terminal-header').addEventListener('click', () => {
  if (state.terminalExpanded) {
    state.terminalExpanded = false;
    state.terminalMaximized = false;
    document.getElementById('terminal-panel').className = 'terminal-panel terminal-panel--collapsed';
  } else {
    state.terminalExpanded = true;
    document.getElementById('terminal-panel').className = 'terminal-panel terminal-panel--expanded';
    renderTerminal();
  }
  updateTerminalLayout();
  updateMainLayout();
});

document.getElementById('term-maximize').addEventListener('click', (e) => {
  e.stopPropagation();
  state.terminalMaximized = !state.terminalMaximized;
  state.terminalExpanded = true;
  const panel = document.getElementById('terminal-panel');
  const btn = document.getElementById('term-maximize');
  panel.className = state.terminalMaximized
    ? 'terminal-panel terminal-panel--maximized'
    : 'terminal-panel terminal-panel--expanded';
  btn.textContent = state.terminalMaximized ? '⛶' : '⬜';
  updateTerminalLayout();
  updateMainLayout();
});

document.getElementById('term-close').addEventListener('click', (e) => {
  e.stopPropagation();
  state.terminalExpanded = false;
  state.terminalMaximized = false;
  document.getElementById('term-maximize').textContent = '⬜';
  document.getElementById('terminal-panel').className = 'terminal-panel terminal-panel--collapsed';
  updateTerminalLayout();
  updateMainLayout();
});

// ── Chat – Sessions & Messages ─────────────────────────────
const chatInput = document.getElementById('chat-input');
const chatSendBtn = document.getElementById('chat-send');
const chatMessages = document.getElementById('chat-messages');
const chatSessionBar = document.getElementById('chat-session-bar');
const chatSessionList = document.getElementById('chat-session-list');
const chatSessionTitle = document.getElementById('chat-session-title');
const chatSessionToggle = document.getElementById('chat-session-toggle');
const chatNewSessionBtn = document.getElementById('chat-new-session');
const chatNewSessionBarBtn = document.getElementById('chat-new-session-bar');
let chatLoading = false;
let currentSessionId = null;
let sessions = [];
let sessionBarVisible = false;

// ── Session sidebar toggle ──
chatSessionToggle.addEventListener('click', () => {
  sessionBarVisible = !sessionBarVisible;
  chatSessionBar.className = sessionBarVisible
    ? 'chat-session-bar chat-session-bar--expanded'
    : 'chat-session-bar chat-session-bar--collapsed';
  if (sessionBarVisible) loadSessions();
});

// ── New session buttons ──
chatNewSessionBtn.addEventListener('click', () => createNewSession());
chatNewSessionBarBtn.addEventListener('click', () => createNewSession());

async function createNewSession() {
  try {
    const res = await fetch(`${API_BASE}/sessions`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({}),
    });
    const session = await res.json();
    currentSessionId = session.id;
    updateSessionTitle(session);
    renderMessages([]);
    await loadSessions();
  } catch (e) {
    console.error('Failed to create session:', e);
    // Fallback: just clear the UI
    currentSessionId = null;
    updateSessionTitle(null);
    renderMessages([]);
  }
  chatInput.focus();
}

async function loadSessions() {
  try {
    const res = await fetch(`${API_BASE}/sessions`);
    sessions = await res.json();
    renderSessionList();
  } catch (e) {
    console.warn('Failed to load sessions:', e);
  }
}

function renderSessionList() {
  chatSessionList.innerHTML = '';
  sessions.forEach(s => {
    const item = document.createElement('div');
    item.className = 'chat-session-item' + (s.id === currentSessionId ? ' chat-session-item--active' : '');
    item.innerHTML = `
      <span class="chat-session-item-title">${escapeHtml(s.title || 'Untitled')}</span>
      <button class="chat-session-item-delete" data-session-id="${s.id}" title="Delete">✕</button>
    `;
    item.addEventListener('click', (e) => {
      if (e.target.closest('.chat-session-item-delete')) return;
      switchToSession(s.id);
    });
    item.querySelector('.chat-session-item-delete').addEventListener('click', (e) => {
      e.stopPropagation();
      deleteSession(s.id);
    });
    chatSessionList.appendChild(item);
  });
}

async function switchToSession(sessionId) {
  currentSessionId = sessionId;
  try {
    const res = await fetch(`${API_BASE}/sessions/${sessionId}`);
    const session = await res.json();
    if (session.model) {
      document.getElementById('chat-model').textContent = session.model;
    }
    updateSessionTitle(session);
    renderMessages(session.messages || []);
    renderSessionList();
  } catch (e) {
    console.error('Failed to load session:', e);
  }
}

async function deleteSession(sessionId) {
  try {
    await fetch(`${API_BASE}/sessions/${sessionId}`, { method: 'DELETE' });
    if (currentSessionId === sessionId) {
      currentSessionId = null;
      updateSessionTitle(null);
      renderMessages([]);
    }
    await loadSessions();
  } catch (e) {
    console.error('Failed to delete session:', e);
  }
}

function updateSessionTitle(session) {
  if (session && session.title) {
    chatSessionTitle.textContent = session.title.length > 40 ? session.title.slice(0, 40) + '…' : session.title;
  } else {
    chatSessionTitle.textContent = 'New Chat';
  }
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// ── Lightweight markdown → HTML renderer ──
function renderMarkdown(md) {
  if (!md) return '';
  // First escape HTML to avoid injection, then we'll re-add safe HTML
  let html = escapeHtml(md);

  // Fenced code blocks (```...```)
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
    return `<pre><code class="lang-${lang}">${code.trim()}</code></pre>`;
  });

  // Inline code (`...`)
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

  // Headers
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

  // Bold + italic
  html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

  // Links [text](url)
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

  // Horizontal rules
  html = html.replace(/^---$/gm, '<hr>');

  // Blockquotes
  html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');

  // Unordered lists: group consecutive - lines into <ul>
  html = html.replace(/(?:^- (.+)(?:\n|$)){2,}/gm, (block) => {
    const items = block.trim().split('\n').map(l => `<li>${l.replace(/^- /, '')}</li>`).join('');
    return `<ul>${items}</ul>`;
  });
  html = html.replace(/^- (.+)$/gm, '<ul><li>$1</li></ul>');

  // Ordered lists
  html = html.replace(/(?:^\d+\. (.+)(?:\n|$)){2,}/gm, (block) => {
    const items = block.trim().split('\n').map(l => `<li>${l.replace(/^\d+\. /, '')}</li>`).join('');
    return `<ol>${items}</ol>`;
  });
  html = html.replace(/^\d+\. (.+)$/gm, '<ol><li>$1</li></ol>');

  // Paragraphs: wrap lines that aren't already in a block element
  // Split by double-newlines for paragraph breaks
  html = html.replace(/\n\n+/g, '\n</p><p>\n');
  // Wrap loose lines in <p> if not already inside a block
  const blockTags = /^<(pre|h[1-3]|ul|ol|blockquote|hr)/;
  const parts = html.split(/(<\/?p>|<pre[\s\S]*?<\/pre>|<h[1-3][^>]*>[\s\S]*?<\/h[1-3]>|<ul[\s\S]*?<\/ul>|<ol[\s\S]*?<\/ol>|<blockquote[\s\S]*?<\/blockquote>|<hr\s*\/?>)/);
  let result = '';
  for (let i = 0; i < parts.length; i++) {
    const p = parts[i];
    if (!p || p.startsWith('<')) { result += p; continue; }
    // If this text segment isn't inside a block, wrap non-empty lines
    const lines = p.split('\n');
    for (const line of lines) {
      const trimmed = line.trim();
      if (!trimmed) continue;
      if (blockTags.test(trimmed)) { result += trimmed; continue; }
      result += `<p>${trimmed}</p>`;
    }
  }
  // Clean up nested <p> tags
  result = result.replace(/<p><p>/g, '<p>').replace(/<\/p><\/p>/g, '</p>');
  result = result.replace(/<p><\/p>/g, '');

  // Newlines inside <p> become spaces; inside <pre> they stay
  result = result.replace(/<p>([\s\S]*?)<\/p>/g, (_, inner) => {
    return `<p>${inner.replace(/\n/g, ' ')}</p>`;
  });

  return result;
}

// ── Render messages from session data ──
function renderMessages(messages) {
  chatMessages.innerHTML = '';
  if (!messages || messages.length === 0) {
    const welcome = document.createElement('div');
    welcome.className = 'chat-msg chat-msg--assistant';
    welcome.innerHTML = `<div class="chat-msg-bubble">What are you working on? I can help you navigate, edit, and understand your codebase.</div>`;
    chatMessages.appendChild(welcome);
    return;
  }
  messages.forEach(msg => renderSingleMessage(msg));
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

function renderSingleMessage(msg) {
  const role = msg.role;

  if (role === 'user') {
    const el = document.createElement('div');
    el.className = 'chat-msg chat-msg--user';
    el.innerHTML = `<div class="chat-msg-bubble">${escapeHtml(msg.content)}</div>
      <div class="chat-msg-meta">you</div>`;
    chatMessages.appendChild(el);
    return;
  }

  if (role === 'assistant') {
    const el = document.createElement('div');
    el.className = 'chat-msg chat-msg--assistant';

    // Render text content
    if (msg.content) {
      const bubble = document.createElement('div');
      bubble.className = 'chat-msg-bubble';
      bubble.innerHTML = renderMarkdown(msg.content);
      el.appendChild(bubble);
    }

    // Render tool calls
    if (msg.toolCalls && msg.toolCalls.length > 0) {
      msg.toolCalls.forEach(tc => {
        const toolEl = createToolCallBlock(tc);
        el.appendChild(toolEl);
      });
    }

    if (!msg.content && (!msg.toolCalls || msg.toolCalls.length === 0)) {
      const bubble = document.createElement('div');
      bubble.className = 'chat-msg-bubble';
      bubble.style.opacity = '0.5';
      bubble.textContent = '(empty)';
      el.appendChild(bubble);
    }

    chatMessages.appendChild(el);
    return;
  }

  if (role === 'tool') {
    const el = document.createElement('div');
    el.className = 'chat-msg chat-msg--assistant';
    const toolEl = createToolResultBlock(msg);
    el.appendChild(toolEl);
    chatMessages.appendChild(el);
    return;
  }
}

function createToolCallBlock(toolCall) {
  const name = toolCall.function?.name || 'unknown';
  const args = toolCall.function?.arguments
    ? (typeof toolCall.function.arguments === 'string' ? toolCall.function.arguments : JSON.stringify(toolCall.function.arguments))
    : '{}';
  const preview = args.length > 80 ? args.slice(0, 80) + '…' : args;

  const wrapper = document.createElement('div');
  wrapper.className = 'chat-tool-call';
  wrapper.innerHTML = `
    <div class="chat-tool-call-header">
      <span class="chat-tool-call-icon">🔧</span>
      <span class="chat-tool-call-name">${escapeHtml(name)}(${escapeHtml(preview)})</span>
      <span class="chat-tool-call-toggle">▶</span>
    </div>
    <div class="chat-tool-call-body">${escapeHtml(typeof args === 'string' ? args : JSON.stringify(args, null, 2))}</div>
  `;
  wrapper.querySelector('.chat-tool-call-header').addEventListener('click', () => {
    wrapper.classList.toggle('chat-tool-call--expanded');
  });
  return wrapper;
}

function createToolResultBlock(msg) {
  const content = msg.content || '';
  const preview = content.length > 100 ? content.slice(0, 100) + '…' : content;
  const toolCallId = msg.toolCallId || '';

  const wrapper = document.createElement('div');
  wrapper.className = 'chat-tool-call';
  wrapper.innerHTML = `
    <div class="chat-tool-call-header">
      <span class="chat-tool-call-icon">📋</span>
      <span class="chat-tool-call-name">${escapeHtml(preview)}</span>
      <span class="chat-tool-call-toggle">▶</span>
    </div>
    <div class="chat-tool-call-body">${escapeHtml(content)}</div>
  `;
  wrapper.querySelector('.chat-tool-call-header').addEventListener('click', () => {
    wrapper.classList.toggle('chat-tool-call--expanded');
  });
  return wrapper;
}

// ── Add a single message optimistically (before server response) ──
function addChatMessage(role, content) {
  const msg = document.createElement('div');
  msg.className = `chat-msg chat-msg--${role}`;

  const bubble = document.createElement('div');
  bubble.className = 'chat-msg-bubble';
  if (role === 'assistant') {
    bubble.innerHTML = renderMarkdown(content);
  } else {
    bubble.textContent = content;
  }
  msg.appendChild(bubble);

  const meta = document.createElement('div');
  meta.className = 'chat-msg-meta';
  meta.textContent = role === 'user' ? 'you' : 'assistant';
  msg.appendChild(meta);

  chatMessages.appendChild(msg);
  chatMessages.scrollTop = chatMessages.scrollHeight;
  return bubble;
}

function addLoadingBubble() {
  const msg = document.createElement('div');
  msg.className = 'chat-msg chat-msg--assistant';
  msg.id = 'chat-loading';

  const bubble = document.createElement('div');
  bubble.className = 'chat-msg-bubble';
  bubble.textContent = 'Thinking…';
  bubble.style.opacity = '0.5';
  msg.appendChild(bubble);

  chatMessages.appendChild(msg);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

function removeLoadingBubble() {
  const el = document.getElementById('chat-loading');
  if (el) el.remove();
}

async function sendChat() {
  const text = chatInput.value.trim();
  if (!text || chatLoading) return;

  chatLoading = true;
  chatSendBtn.disabled = true;
  chatSendBtn.style.opacity = '0.5';

  // Optimistically add user message
  addChatMessage('user', text);
  chatInput.value = '';
  chatInput.style.height = 'auto';

  // Show loading
  addLoadingBubble();

  const model = document.getElementById('chat-model').textContent || '';

  try {
    // Create session if we don't have one
    if (!currentSessionId) {
      try {
        const sessRes = await fetch(`${API_BASE}/sessions`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title: text.slice(0, 60) }),
        });
        const sessData = await sessRes.json();
        currentSessionId = sessData.id;
        updateSessionTitle(sessData);
        await loadSessions();
      } catch (e) {
        console.error('Failed to create session:', e);
      }
    }

    const res = await fetch(`${API_BASE}/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        sessionId: currentSessionId,
        message: text,
        model: model || undefined,
        workspaceRoot: state.workspaceRoot || undefined,
      }),
    });
    const data = await res.json();
    removeLoadingBubble();

    if (data.error) {
      addChatMessage('assistant', `⚠ ${data.message || 'Error contacting provider'}`);
      if (data.model) {
        document.getElementById('chat-model').textContent = data.model;
      }
    } else {
      // Re-render from session data if we have it
      if (data.session && data.session.messages) {
        renderMessages(data.session.messages);
        updateSessionTitle(data.session);
        currentSessionId = data.sessionId || currentSessionId;
      } else if (data.content) {
        addChatMessage('assistant', data.content);
      }
      if (data.model) {
        document.getElementById('chat-model').textContent = data.model;
      }
    }
  } catch (e) {
    removeLoadingBubble();
    addChatMessage('assistant', `⚠ Network error: ${e.message}`);
  }

  chatLoading = false;
  chatSendBtn.disabled = false;
  chatSendBtn.style.opacity = '1';
}

// ── Re-attach input listeners ──
chatInput.addEventListener('input', () => {
  chatInput.style.height = 'auto';
  chatInput.style.height = Math.min(chatInput.scrollHeight, 100) + 'px';
});

chatInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendChat();
  }
});

chatSendBtn.addEventListener('click', sendChat);

function applyTheme(theme) {
  currentTheme = theme;
  localStorage.setItem('cammander-theme', theme);
  const resolved = theme === 'system'
    ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
    : theme;

  // Update meta theme-color for mobile

  themeButtons.forEach(b => b.classList.toggle('settings-theme-btn--active', b.dataset.themeVal === theme));

  if (xtermInstance && state.terminalExpanded) {
    const wasConnected = termSocket && termSocket.connected;
    initTerminal();
  }
}

const settingsOverlay = document.getElementById('settings-overlay');
const btnSettings = document.getElementById('btn-settings');
const settingsClose = document.getElementById('settings-close');
const tabCloud = document.getElementById('tab-cloud');
const tabLocal = document.getElementById('tab-local');
const settingsCloud = document.getElementById('settings-cloud');
const settingsLocal = document.getElementById('settings-local');
const settingsStatus = document.getElementById('settings-status');
const settingsSave = document.getElementById('settings-save');

let activeProviderTab = 'ollama-cloud';

function openSettings() {
  settingsOverlay.classList.add('settings-overlay--open');
  loadSettings();
}
function closeSettings() {
  settingsOverlay.classList.remove('settings-overlay--open');
  settingsStatus.textContent = '';
  settingsStatus.className = 'settings-status';
}

function setProviderTab(provider) {
  activeProviderTab = provider;
  document.querySelectorAll('.settings-provider-tab').forEach(t => {
    t.classList.toggle('settings-provider-tab--active', t.dataset.provider === provider);
  });
  settingsCloud.style.display = provider === 'ollama-cloud' ? '' : 'none';
  settingsLocal.style.display = provider === 'ollama-local' ? '' : 'none';
  // Update active indicator label
  const label = document.getElementById('settings-active-label');
  const indicator = document.getElementById('settings-active-indicator');
  if (provider === 'ollama-cloud') {
    label.textContent = 'Using Ollama Cloud';
  } else {
    label.textContent = 'Using Ollama Local';
  }
  // Reset connection status (will be checked on save/load)
  indicator.className = 'settings-active-indicator';
}

async function loadSettings() {
  try {
    const res = await fetch(`${API_BASE}/settings`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    document.getElementById('cloud-api-key').value = data.ollamaCloud?.apiKey || '';
    document.getElementById('cloud-base-url').value = data.ollamaCloud?.baseUrl || '';
    document.getElementById('local-host').value = data.ollamaLocal?.host || 'localhost';
    document.getElementById('local-port').value = data.ollamaLocal?.port || 11434;
    document.getElementById('default-model').value = data.defaultModel || '';
    if (data.defaultModel) {
      document.getElementById('chat-model').textContent = data.defaultModel;
    }
    setProviderTab(data.activeProvider || 'ollama-cloud');
    // Backend is reachable — show connected status
    document.getElementById('settings-active-label').textContent =
      (data.activeProvider === 'ollama-local' ? 'Using Ollama Local' : 'Using Ollama Cloud') + ' — connected';
    document.getElementById('settings-active-indicator').classList.remove('settings-active-indicator--err', 'settings-active-indicator--warn');
    settingsStatus.textContent = '';
    settingsStatus.className = 'settings-status';
  } catch (e) {
    console.warn('Settings load error:', e.message);
    // Backend not reachable — load from localStorage
    const saved = JSON.parse(localStorage.getItem('cammander-settings') || '{}');
    document.getElementById('cloud-api-key').value = saved.ollamaCloud?.apiKey || '';
    document.getElementById('cloud-base-url').value = saved.ollamaCloud?.baseUrl || 'https://ollama.com/v1';
    document.getElementById('local-host').value = saved.ollamaLocal?.host || 'localhost';
    document.getElementById('local-port').value = saved.ollamaLocal?.port || 11434;
    document.getElementById('default-model').value = saved.defaultModel || '';
    if (saved.defaultModel) {
      document.getElementById('chat-model').textContent = saved.defaultModel;
    }
    setProviderTab(saved.activeProvider || 'ollama-cloud');
    // Backend not reachable — show offline warning
    document.getElementById('settings-active-label').textContent =
      (saved.activeProvider === 'ollama-local' ? 'Using Ollama Local' : 'Using Ollama Cloud') + ' — backend offline';
    document.getElementById('settings-active-indicator').classList.add('settings-active-indicator--warn');
  }
}

async function saveSettings() {
  const payload = {
    activeProvider: activeProviderTab,
    ollamaCloud: {
      apiKey: document.getElementById('cloud-api-key').value,
      baseUrl: document.getElementById('cloud-base-url').value || 'https://ollama.com/v1',
    },
    ollamaLocal: {
      host: document.getElementById('local-host').value || 'localhost',
      port: parseInt(document.getElementById('local-port').value) || 11434,
    },
    defaultModel: document.getElementById('default-model').value,
  };

  // Always save to localStorage as backup
  localStorage.setItem('cammander-settings', JSON.stringify(payload));

  try {
    const res = await fetch(`${API_BASE}/settings`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    settingsStatus.textContent = '✓ Settings saved';
    settingsStatus.className = 'settings-status settings-status--ok';
    const indicator = document.getElementById('settings-active-indicator');
    indicator.classList.remove('settings-active-indicator--err', 'settings-active-indicator--warn');
    const label = document.getElementById('settings-active-label');
    label.textContent = activeProviderTab === 'ollama-cloud' ? 'Using Ollama Cloud — connected' : 'Using Ollama Local — connected';

    // Update the model badge in chat header
    if (payload.defaultModel) {
      document.getElementById('chat-model').textContent = payload.defaultModel;
    }
  } catch (e) {
    settingsStatus.textContent = `Saved locally (${e.message})`;
    settingsStatus.className = 'settings-status settings-status--err';
    const indicator = document.getElementById('settings-active-indicator');
    indicator.classList.add('settings-active-indicator--warn');
    const label = document.getElementById('settings-active-label');
    label.textContent = activeProviderTab === 'ollama-cloud' ? 'Using Ollama Cloud — offline (saved locally)' : 'Using Ollama Local — offline (saved locally)';
    console.error('Settings save error:', e);
  }
}

settingsClose.addEventListener('click', closeSettings);
settingsOverlay.addEventListener('click', (e) => {
  if (e.target === settingsOverlay) closeSettings();
});
tabCloud.addEventListener('click', () => setProviderTab('ollama-cloud'));
tabLocal.addEventListener('click', () => setProviderTab('ollama-local'));
settingsSave.addEventListener('click', saveSettings);

const wpickerOverlay = document.getElementById('wpicker-overlay');
const wpickerList = document.getElementById('wpicker-list');
const wpickerPath = document.getElementById('wpicker-path');
const wpickerOpenBtn = document.getElementById('wpicker-open');
let wpickerSelected = null; // { name, path }

async function loadHomeFolders(basePath) {
  wpickerList.innerHTML = '<div class="wpicker-empty">Loading…</div>';
  wpickerSelected = null;
  wpickerOpenBtn.disabled = true;
  wpickerOpenBtn.textContent = 'Select a folder';

  try {
    const params = basePath ? `?base=${encodeURIComponent(basePath)}` : '';
    const res = await fetch(`${API_BASE}/workspaces/home-folders${params}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const folders = await res.json();

    if (!folders.length) {
      wpickerList.innerHTML = '<div class="wpicker-empty">No folders found. Try a different path.</div>';
      return;
    }

    wpickerList.innerHTML = '';
    for (const f of folders) {
      const item = document.createElement('div');
      item.className = 'wpicker-item';
      item.innerHTML = `
        <span class="wpicker-item-icon">${f.isProject ? '📦' : '📁'}</span>
        <div class="wpicker-item-info">
          <div class="wpicker-item-name">${f.name}</div>
          <div class="wpicker-item-path">${f.path}</div>
        </div>
        ${f.hasGit ? '<span class="wpicker-item-badge wpicker-item-badge--git">git</span>' : ''}
      `;
      item.addEventListener('click', () => {
        document.querySelectorAll('.wpicker-item').forEach(el => el.classList.remove('wpicker-item--selected'));
        item.classList.add('wpicker-item--selected');
        wpickerSelected = f;
        wpickerOpenBtn.disabled = false;
        wpickerOpenBtn.textContent = `Open ${f.name}`;
      });
      item.addEventListener('dblclick', () => {
        openWorkspace(f.path, f.name);
      });
      wpickerList.appendChild(item);
    }
  } catch (err) {
    wpickerList.innerHTML = `<div class="wpicker-empty">Error: ${err.message}</div>`;
  }
}

async function browsePath(dirPath) {
  wpickerList.innerHTML = '<div class="wpicker-empty">Loading…</div>';
  wpickerSelected = null;
  wpickerOpenBtn.disabled = true;

  try {
    const params = dirPath ? `?path=${encodeURIComponent(dirPath)}` : '';
    const res = await fetch(`${API_BASE}/workspaces/browse${params}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    wpickerList.innerHTML = '';
    // Add "up" button
    const parentPath = data.path.split('/').slice(0, -1).join('/') || '/';
    if (data.path !== '/') {
      const up = document.createElement('div');
      up.className = 'wpicker-item';
      up.innerHTML = `
        <span class="wpicker-item-icon">⬆</span>
        <div class="wpicker-item-info">
          <div class="wpicker-item-name">..</div>
          <div class="wpicker-item-path">${parentPath}</div>
        </div>
      `;
      up.addEventListener('click', () => {
        wpickerPath.value = parentPath;
        browsePath(parentPath);
      });
      wpickerList.appendChild(up);
    }

    for (const e of data.entries) {
      const item = document.createElement('div');
      item.className = 'wpicker-item';
      item.innerHTML = `
        <span class="wpicker-item-icon">${e.hasGit ? '📦' : '📁'}</span>
        <div class="wpicker-item-info">
          <div class="wpicker-item-name">${e.name}</div>
          <div class="wpicker-item-path">${e.path}</div>
        </div>
        ${e.hasGit ? '<span class="wpicker-item-badge wpicker-item-badge--git">git</span>' : ''}
      `;
      item.addEventListener('click', () => {
        document.querySelectorAll('.wpicker-item').forEach(el => el.classList.remove('wpicker-item--selected'));
        item.classList.add('wpicker-item--selected');
        wpickerSelected = e;
        wpickerOpenBtn.disabled = false;
        wpickerOpenBtn.textContent = `Open ${e.name}`;
      });
      item.addEventListener('dblclick', () => {
        // Double-click a folder: navigate into it
        wpickerPath.value = e.path;
        browsePath(e.path);
      });
      wpickerList.appendChild(item);
    }

    // Allow selecting the current directory itself
    wpickerOpenBtn.disabled = false;
    wpickerOpenBtn.textContent = `Open this folder`;
    wpickerSelected = { name: data.path.split('/').pop() || data.path, path: data.path };
  } catch (err) {
    wpickerList.innerHTML = `<div class="wpicker-empty">Error: ${err.message}</div>`;
  }
}

function openWorkspace(absPath, name) {
  state.workspaceRoot = absPath;

  state.currentView = 'folder';

  localStorage.setItem('cammander-workspace', absPath);
  hideWorkspacePicker();
  render();

}

    if (p) browsePath(p);
    else loadHomeFolders();
  }
});
// Open Folder topbar button opens workspace picker
document.getElementById('btn-open').addEventListener('click', showWorkspacePicker);

// ── New Workspace ─────────────────────────────────────
const wpickerNewBtn = document.getElementById('wpicker-new-btn');
const wpickerNewRow = document.getElementById('wpicker-new-row');
const wpickerNewName = document.getElementById('wpicker-new-name');
const wpickerNewCreate = document.getElementById('wpicker-new-create');

wpickerNewBtn.addEventListener('click', () => {
  const visible = wpickerNewRow.style.display !== 'none';
  wpickerNewRow.style.display = visible ? 'none' : 'flex';
  if (!visible) wpickerNewName.focus();
});

wpickerNewCreate.addEventListener('click', createNewWorkspace);
wpickerNewName.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { e.preventDefault(); createNewWorkspace(); }
});

async function createNewWorkspace() {
  const name = wpickerNewName.value.trim();
  if (!name) return;
  // Determine parent: use current browse path or home
  const parentPath = wpickerPath.value.trim() || '/home/sc';
  const fullPath = parentPath + '/' + name;

  try {
    const res = await fetch(`${API_BASE}/files/create?path=${encodeURIComponent(parentPath)}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, type: 'directory' }),
    });
    const data = await res.json();
    if (data.error && data.message !== 'Already exists') {
      throw new Error(data.message || 'Create failed');
    }
    // Open the newly created (or already existing) workspace
    openWorkspace(fullPath, name);
  } catch (err) {
    alert('Could not create workspace: ' + err.message);
  }
}

// ── Initial render ─────────────────────────────────────
if (state.workspaceRoot) {
  // Already have a workspace from localStorage — boot straight into it
  const wsName = state.workspaceRoot.split('/').pop();
  document.title = wsName;
  render();
} else {
  // No workspace saved — show the picker
  showWorkspacePicker();
}
// Load model badge from settings on startup
loadSettings();
</script>

</body>
</html>
